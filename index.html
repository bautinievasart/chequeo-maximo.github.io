<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Rent A Car v3</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --main: #1a1a1a; --blue: #0056b3; --orange: #e67e22; --green: #27ae60; --gray: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: #d1d8e0; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        header { background: var(--main); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--blue); }
        .logo-img { max-width: 120px; height: auto; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        
        .tabs { display: flex; background: #eee; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; font-weight: bold; cursor: pointer; background: none; transition: 0.3s; font-size: 11px; border-radius: 10px; }
        .tab-btn.active { background: white; color: var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .content { padding: 20px; display: none; }
        .content.active { display: block !important; }

        .section-title { background: #f8f9fa; color: var(--blue); padding: 8px; font-weight: bold; border-left: 4px solid var(--blue); margin: 20px 0 10px; font-size: 13px; text-transform: uppercase; }
        
        label { display: block; margin: 15px 0 5px; font-weight: 700; font-size: 14px; color: #444; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .sig-container { border: 2px dashed #ccc; background: #fafafa; border-radius: 15px; margin-top: 10px; height: 180px; }
        #signature-pad, #signature-pad-mov { width: 100%; height: 100%; touch-action: none; }
        
        .btn-main { width: 100%; padding: 20px; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; margin-top: 20px; }
        .btn-check { background: var(--blue); }
        .btn-danos { background: var(--orange); }
        .btn-entrega { background: var(--green); }

        .card-foto { border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 20px; background: #fdfdfd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .img-prev { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }

        #foto-indicador { background: #fff3cd; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #ffeeba; margin-bottom: 10px; font-weight: bold; color: #856404; }
        .btn-secuencial { background: #444; color: white; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .progreso-fotos { font-size: 12px; color: #666; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Maximo Rent A Car" class="logo-img">
        <h2 style="margin:0; letter-spacing: 1px; font-size: 18px;">MAXIMO <span style="color:var(--blue)">RENT A CAR</span></h2>
    </header>

    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="switchTab('mecanica')">INSPECCIÓN</button>
        <button id="t2" class="tab-btn" onclick="switchTab('danos')">DAÑOS</button>
        <button id="t3" class="tab-btn" onclick="switchTab('entregas')">ENTREGAS</button>
    </div>

    <div id="mecanica" class="content active">
        <label>Fecha del Reporte</label>
    <input type="date" id="fecha1" class="fecha-auto">
    ```
        <label>Nombre del Empleado</label>
        <input type="text" id="emp" placeholder="Escriba su nombre">
        <div class="grid">
            <div><label>Patente</label><input type="text" id="pat1" placeholder="ABC-123"></div>
            <div><label>KM</label><input type="number" id="km"></div>
        </div>
        <div class="section-title">Fluidos y Mecánica</div>
        <div class="grid">
            <div><label>Aceite</label><select id="oil"><option>OK</option><option>BAJO</option></select></div>
            <div><label>Agua</label><select id="wat"><option>OK</option><option>BAJO</option></select></div>
        </div>
        <div class="grid">
            <div><label>Frenos</label><select id="fre"><option>OK</option><option>BAJO</option></select></div>
            <div><label>Hidráulico</label><select id="hid"><option>OK</option><option>BAJO</option><option>N/A</option></select></div>
        </div>
        <div class="section-title">Seguridad</div>
        <div class="grid">
            <div><label>Luces</label><select id="luc"><option>OK</option><option>FALLA</option></select></div>
            <div><label>Gomas</label><select id="neu"><option>OK</option><option>REVISAR</option></select></div>
        </div>
        <div class="grid">
            <div><label>Extintor</label><input type="text" id="ext" placeholder="Vto"></div>
            <div><label>Zorrino</label><select id="zor"><option>OK</option><option>VACÍO</option></select></div>
        </div>
        <label>Observaciones</label>
        <textarea id="obs" rows="2"></textarea>
        <div class="section-title">Firma del Responsable</div>
        <div class="sig-container"><canvas id="signature-pad"></canvas></div>
        <button onclick="signaturePad.clear()" style="width:100%; margin-top:10px; padding:10px; border-radius:10px;">BORRAR FIRMA</button>
        <button class="btn-main btn-check" onclick="generarCheck()">DESCARGAR REPORTE TÉCNICO</button>
        <button class="btn-main" style="background:#25D366; margin-top:10px;" onclick="enviarWhatsApp()">
    REPORTE POR WHATSAPP 📱</button>
    </div>

    <div id="danos" class="content">
        <label>Fecha del Reporte</label>
    <input type="date" id="fecha2" class="fecha-auto">
        <label>Patente Vehículo</label>
        <input type="text" id="pat2" placeholder="Patente para daños">
        <div id="lista-fotos" style="margin-top:20px;"></div>
        <button onclick="nuevaFoto('lista-fotos')" style="width:100%; padding:15px; background:#666; color:white; border:none; border-radius:12px; font-weight:bold;">+ AGREGAR FOTO DE DAÑO</button>
        <button class="btn-main btn-danos" onclick="generarDanos()">DESCARGAR REPORTE DE DAÑOS</button>
        <button class="btn-main" style="background:#25D366; margin-top:10px;" onclick="enviarWhatsApp()">
    REPORTE POR WHATSAPP 📱</button>
    </div>

    <div id="entregas" class="content">
        <label>Fecha del Reporte</label>
    <input type="date" id="fecha3" class="fecha-auto">
        <label>Tipo de Movimiento</label>
        <select id="mov_tipo"><option>ENTREGA</option><option>DEVOLUCIÓN</option></select>
        <div class="grid">
            <div><label>Patente</label><input type="text" id="pat3" placeholder="ABC-123"></div>
            <div><label>Kilometraje</label><input type="number" id="km_mov"></div>
        </div>
        <label>Nivel de Combustible</label>
        <select id="fuel_mov">
            <option value="1/8">1/8 (Reserva)</option>
    <option value="2/8">2/8 (1/4)</option>
    <option value="3/8">3/8</option>
    <option value="4/8">4/8 (1/2)</option>
    <option value="5/8">5/8</option>
    <option value="6/8">6/8 (3/4)</option>
    <option value="7/8">7/8</option>
    <option value="8/8">8/8 (Lleno)</option>
        </select>
        
        <div class="section-title">Registro Fotográfico Unidad</div>
        <div id="foto-indicador">SIGUIENTE: <span id="nombre-parte">RUEDA C/D</span></div>
        <input type="file" id="input-secuencial" accept="image/*" capture="camera" style="display:none" onchange="capturarFotoSecuencial(this)">
        <button class="btn-secuencial" onclick="document.getElementById('input-secuencial').click()">📸 TOMAR FOTO</button>
        <div id="progreso-texto" class="progreso-fotos">0 de 21 fotos tomadas</div>
        <div id="lista-fotos-entrega" style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>

        <label>Estado General / Limpieza</label>
        <textarea id="obs_mov" rows="3" placeholder="Ej: Auto limpio..."></textarea>

        <div class="section-title">Firma Conformidad</div>
        <div class="sig-container"><canvas id="signature-pad-mov"></canvas></div>
        <button onclick="signaturePadMov.clear()" style="width:100%; margin-top:10px; padding:10px; border-radius:10px;">BORRAR FIRMA</button>

        <button class="btn-main btn-entrega" onclick="generarMovimiento()">DESCARGAR REPORTE MOVIMIENTO</button>
        <button class="btn-main" style="background:#25D366; margin-top:10px;" onclick="enviarWhatsApp()">
    REPORTE POR WHATSAPP 📱</button>


     
        


    </div>
</div>

<script>
    let signaturePad, signaturePadMov;
    let fotoCount = 0;
    const listaPartes = [
        "RUEDA C/D", "RUEDA C/T", "RUEDA A/D", "RUEDA A/T", "CAPOT", "PARAGOLPE D", 
        "GUARDABARRO C/D", "PUERTA C", "PUERTA C/T", "GUARDABARRO C/T", "BAUL", 
        "GUARDABARRO A/T", "PUERTA A/T", "PUERTA A", "GUARDABARRO A/D", "TECHO", 
        "PARABRISAS", "INTERIOR", "ASIENTOS TRASEROS", "MOTOR", "RUEDA AUXILIO"
    ];
    let parteActualIndex = 0;
    let fotosEntregas = [];

    window.onload = () => {
        const canvas1 = document.getElementById('signature-pad');
        const canvas2 = document.getElementById('signature-pad-mov');
        signaturePad = new SignaturePad(canvas1);
        signaturePadMov = new SignaturePad(canvas2);

        const resize = () => {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            [canvas1, canvas2].forEach(c => {
                c.width = c.offsetWidth * ratio;
                c.height = c.offsetHeight * ratio;
                c.getContext("2d").scale(ratio, ratio);
            });
        };
        window.onresize = resize; resize();
    };

    function switchTab(tab) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        if(tab === 'mecanica') document.getElementById('t1').classList.add('active');
        if(tab === 'danos') document.getElementById('t2').classList.add('active');
        if(tab === 'entregas') document.getElementById('t3').classList.add('active');
    }

    function nuevaFoto(contenedorId) {
        fotoCount++;
        const div = document.createElement('div');
        div.className = 'card-foto';
        div.innerHTML = `<label style="color:var(--orange)">DAÑO #${fotoCount}</label><input type="file" accept="image/*" capture="camera" onchange="readImg(this, 'p${fotoCount}')"><img id="p${fotoCount}" class="img-prev img-danos-file"><textarea placeholder="Descripción..." style="margin-top:10px"></textarea>`;
        document.getElementById(contenedorId).appendChild(div);
    }

    function capturarFotoSecuencial(input) {
        if (input.files && input.files[0] && parteActualIndex < listaPartes.length) {
            const reader = new FileReader();
            reader.onload = (e) => {
                fotosEntregas.push({ nombre: listaPartes[parteActualIndex], src: e.target.result });
                const div = document.createElement('div');
                div.style = "background:#eee; border-radius:10px; padding:5px; text-align:center; font-size:10px;";
                div.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:5px;"><br><b>${listaPartes[parteActualIndex]}</b>`;
                document.getElementById('lista-fotos-entrega').appendChild(div);
                parteActualIndex++;
                actualizarInterfazSecuencial();
            };
            reader.readAsDataURL(input.files[0]);
            input.value = "";
        }
    }

    function actualizarInterfazSecuencial() {
        const indicador = document.getElementById('nombre-parte');
        const progreso = document.getElementById('progreso-texto');
        if (parteActualIndex < listaPartes.length) {
            indicador.innerText = listaPartes[parteActualIndex];
            progreso.innerText = `${parteActualIndex} de 21 fotos tomadas`;
        } else {
            document.getElementById('foto-indicador').innerHTML = "✅ FOTOS COMPLETAS";
            document.querySelector('.btn-secuencial').style.display = 'none';
        }
    }

    function readImg(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { const img = document.getElementById(id); img.src = e.target.result; img.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- NUEVAS FUNCIONES DE PDF PROFESIONALES (REEMPLAZA LAS ANTERIORES) ---

    function drawHeader(doc, title, colorHex) {
        doc.setFillColor(colorHex);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.text("MAXIMO RENT A CAR", 20, 20);
        doc.setFontSize(12);
        doc.setFont("helvetica", "normal");
        doc.text(title, 20, 30);
        
        doc.setFillColor(255, 255, 255, 0.5);
        doc.rect(20, 33, 170, 0.5, 'F');
    }

    function generarCheck() {
        const { jsPDF } = window.jspdf; 
        const doc = new jsPDF();
        const p = (document.getElementById('pat1').value || "S/D").toUpperCase();
        
        drawHeader(doc, "INFORME TÉCNICO DE MANTENIMIENTO", "#1a1a1a");

        let y = 55;
        doc.setTextColor(40, 40, 40);
        doc.setFontSize(10);

        const data = [
            ["EMPLEADO", document.getElementById('emp').value],
            ["FECHA", new Date().toLocaleString()],
            ["PATENTE", p],
            ["KILOMETRAJE", document.getElementById('km').value],
            ["ACEITE", document.getElementById('oil').value],
            ["AGUA/REFRIG.", document.getElementById('wat').value],
            ["FRENOS", document.getElementById('fre').value],
            ["LUCES", document.getElementById('luc').value],
            ["NEUMÁTICOS", document.getElementById('neu').value]
        ];

        data.forEach(([label, val]) => {
            doc.setFont("helvetica", "bold");
            doc.text(label + ":", 25, y);
            doc.setFont("helvetica", "normal");
            doc.text(String(val), 70, y);
            doc.setDrawColor(230);
            doc.line(20, y + 2, 190, y + 2);
            y += 10;
        });

        if (document.getElementById('obs').value) {
            y += 5;
            doc.setFont("helvetica", "bold");
            doc.text("OBSERVACIONES:", 25, y);
            y += 7;
            doc.setFont("helvetica", "normal");
            doc.text(document.getElementById('obs').value, 25, y, { maxWidth: 160 });
        }

        if(!signaturePad.isEmpty()) {
            doc.setDrawColor(0);
            doc.text("FIRMA RESPONSABLE:", 25, 245);
            doc.addImage(signaturePad.toDataURL(), 'PNG', 25, 250, 50, 20);
        }
        
        doc.save(`Check_Tecnico_${p}.pdf`);
    }

    async function generarDanos() {
        const { jsPDF } = window.jspdf; 
        const doc = new jsPDF();
        const p = (document.getElementById('pat2').value || "S/D").toUpperCase();
        
        drawHeader(doc, "REPORTE DETALLADO DE DAÑOS", "#e67e22");

        let y = 50;
        const fotos = document.querySelectorAll('.card-foto');

        fotos.forEach((card, i) => {
            const img = card.querySelector('img');
            const desc = card.querySelector('textarea').value || "Sin descripción";

            if(img.src.startsWith('data')) {
                if(y > 220) { doc.addPage(); y = 50; }

                doc.setDrawColor(200);
                doc.rect(20, y, 170, 55); 

                doc.addImage(img.src, 'JPEG', 23, y + 3, 75, 49);

                doc.setDrawColor(230);
                doc.setFillColor(250, 250, 250);
                doc.rect(103, y + 3, 82, 49, 'FD');
                
                doc.setTextColor(230, 126, 34);
                doc.setFont("helvetica", "bold");
                doc.text(`DAÑO #0${i+1}`, 108, y + 12);
                
                doc.setTextColor(0);
                doc.setFont("helvetica", "normal");
                doc.setFontSize(9);
                doc.text(desc, 108, y + 22, { maxWidth: 72 });

                y += 62;
            }
        });

        doc.save(`Danos_${p}.pdf`);
    }

    function generarMovimiento() {
        const { jsPDF } = window.jspdf; 
        const doc = new jsPDF();
        const tipo = document.getElementById('mov_tipo').value;
        const p = (document.getElementById('pat3').value || "S/D").toUpperCase();
        
        const color = tipo === "ENTREGA" ? "#27ae60" : "#2980b9";
        drawHeader(doc, `REPORTE DE ${tipo} DE UNIDAD`, color);

        let y = 50;
        doc.setFontSize(10);
        doc.setTextColor(50);
        
        doc.setFont("helvetica", "bold");
        doc.text("PATENTE:", 20, y); doc.setFont("helvetica", "normal"); doc.text(p, 45, y);
        doc.setFont("helvetica", "bold");
        doc.text("KM:", 100, y); doc.setFont("helvetica", "normal"); doc.text(document.getElementById('km_mov').value, 115, y);
        y += 8;
        doc.setFont("helvetica", "bold");
        doc.text("FECHA:", 20, y); doc.setFont("helvetica", "normal"); doc.text(new Date().toLocaleString(), 45, y);
        doc.setFont("helvetica", "bold");
        doc.text("COMBUSTIBLE:", 100, y); doc.setFont("helvetica", "normal"); doc.text(document.getElementById('fuel_mov').value, 135, y);
        
        y += 15;
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.text("REGISTRO FOTOGRÁFICO DE ESTADO", 20, y);
        y += 5;

        fotosEntregas.forEach((foto, i) => {
            if(y > 230) { doc.addPage(); y = 50; }

            doc.setDrawColor(220);
            doc.rect(20, y, 170, 40);
            
            doc.addImage(foto.src, 'JPEG', 22, y + 2, 60, 36);
            
            doc.setFillColor(248, 249, 250);
            doc.rect(85, y + 2, 103, 36, 'F');
            doc.setTextColor(0);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text(foto.nombre, 90, y + 15);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(8);
            doc.text("Verificado en inspección visual previa a la firma.", 90, y + 25);
            
            y += 45;
        });

        if(!signaturePadMov.isEmpty()) {
            if(y > 230) doc.addPage();
            doc.setTextColor(0);
            doc.setFontSize(11);
            doc.text("FIRMA DE CONFORMIDAD:", 25, 245);
            doc.addImage(signaturePadMov.toDataURL(), 'PNG', 25, 250, 50, 20);
        }

        doc.save(`${tipo}_${p}.pdf`);
    }
    function enviarWhatsApp() {
    const tabActiva = document.querySelector('.content.active').id;
    let mensaje = "";
    let patente = "";

    if (tabActiva === 'mecanica') {
        patente = document.getElementById('pat1').value || "S/D";
        mensaje = `✅ *REPORTE TÉCNICO - MAXIMO RENT A CAR*\n\n👤 *Empleado:* ${document.getElementById('emp').value}\n🚗 *Patente:* ${patente.toUpperCase()}\n📍 *KM:* ${document.getElementById('km').value}`;
    } 
    else if (tabActiva === 'danos') {
        patente = document.getElementById('pat2').value || "S/D";
        mensaje = `⚠️ *REPORTE DE DAÑOS - MAXIMO RENT A CAR*\n\n🚗 *Vehículo:* ${patente.toUpperCase()}\n📸 Se han registrado nuevos daños.`;
    } 
    else if (tabActiva === 'entregas') {
        patente = document.getElementById('pat3').value || "S/D";
        const tipo = document.getElementById('mov_tipo').value;
        mensaje = `📦 *MOVIMIENTO (${tipo}) - MAXIMO RENT A CAR*\n\n🚗 *Patente:* ${patente.toUpperCase()}\n⛽ *Combustible:* ${document.getElementById('fuel_mov').value}\n📍 *KM:* ${document.getElementById('km_mov').value}`;
    }

    // Al no poner número, WhatsApp abre la lista de contactos para elegir
    const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
    window.open(url, '_blank');
}
</script>
</body>
</html>
