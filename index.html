<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Rent A Car v3 - Completo</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --main: #1a1a1a; --blue: #0056b3; --orange: #e67e22; --gray: #f4f7f6; --success: #27ae60; }
        body { font-family: -apple-system, sans-serif; background: #d1d8e0; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        header { background: var(--main); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--blue); }
        .logo-img { max-width: 100px; height: auto; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
        
        .tabs { display: flex; background: #eee; padding: 5px; gap: 2px; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; font-weight: bold; cursor: pointer; background: none; transition: 0.3s; font-size: 10px; border-radius: 8px; text-transform: uppercase; }
        .tab-btn.active { background: white; color: var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .content { padding: 20px; display: none; }
        .content.active { display: block !important; }

        .section-title { background: #f8f9fa; color: var(--blue); padding: 8px; font-weight: bold; border-left: 4px solid var(--blue); margin: 20px 0 10px; font-size: 12px; text-transform: uppercase; }
        
        label { display: block; margin: 15px 0 5px; font-weight: 700; font-size: 14px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        
        /* Selector de Modo */
        .mode-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px; border: 2px solid var(--blue); border-radius: 10px; background: white; color: var(--blue); font-weight: bold; cursor: pointer; font-size: 12px; }
        .mode-btn.active { background: var(--blue); color: white; }

        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .panel-card { border: 1px solid #ddd; padding: 10px; border-radius: 12px; text-align: center; background: #fafafa; }
        .panel-label { font-size: 9px; font-weight: bold; margin-bottom: 5px; display: block; height: 20px; overflow: hidden; }
        
        .thumb-container { display: flex; gap: 5px; margin-top: 8px; justify-content: center; }
        .thumb { width: 45%; height: 50px; object-fit: cover; border-radius: 5px; border: 1px solid #ccc; display: none; }
        
        .sig-container { border: 2px dashed #ccc; background: #fafafa; border-radius: 15px; margin-top: 10px; height: 150px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 15px; color: white; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-blue { background: var(--blue); }
        .btn-orange { background: var(--orange); }
        .btn-save { background: var(--success); margin-top: 20px; }

        .extra-photo-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; gap: 10px; }
        .extra-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Maximo Rent A Car" class="logo-img">
        <h2 style="margin:0; letter-spacing: 1px; font-size: 16px;">MAXIMO <span style="color:var(--blue)">RENT A CAR</span></h2>
    </header>

    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="switchTab('entrega')">Entrega/Devolución</button>
        <button id="t2" class="tab-btn" onclick="switchTab('mecanica')">Inspección Técnica</button>
        <button id="t3" class="tab-btn" onclick="switchTab('danos')">Daños Extra</button>
    </div>

    <div id="entrega" class="content active">
        <div class="section-title">Datos de Auditoría</div>
        <label>Patente Vehículo</label>
        <input type="text" id="pat_comp" placeholder="ABC-123" oninput="loadHistory()">
        
        <label>Modo de Operación</label>
        <div class="mode-selector">
            <button id="mode-ent" class="mode-btn active" onclick="setMode('entrega')">ENTREGA</button>
            <button id="mode-dev" class="mode-btn" onclick="setMode('devolucion')">DEVOLUCIÓN</button>
        </div>

        <div class="section-title">Fotos de Paneles (24)</div>
        <div class="panel-grid" id="grid-paneles"></div>

        <div class="section-title">Firma del Cliente</div>
        <div class="sig-container"><canvas id="sig-cliente"></canvas></div>
        <button onclick="sigCliente.clear()" style="width:100%; margin-top:5px; font-size:10px; background:none; border:none; text-decoration:underline;">LIMPIAR FIRMA</button>

        <button class="btn-main btn-save" onclick="saveToLocal()">GUARDAR ESTADO DE ENTREGA</button>
        <button class="btn-main btn-blue" onclick="genPDFComp()">DESCARGAR PDF COMPARATIVO</button>
    </div>

    <div id="mecanica" class="content">
        <div class="section-title">Verificación de Fluidos y KM</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Aceite</label><select id="tec_oil"><option>ÓPTIMO</option><option>BAJO</option><option>NECESITA CAMBIO</option></select></div>
            <div><label>Agua/Refrig.</label><select id="tec_wat"><option>ÓPTIMO</option><option>BAJO</option></select></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Frenos</label><select id="tec_fre"><option>OK</option><option>RUIDO/DESGASTE</option></select></div>
            <div><label>KM Actual</label><input type="number" id="tec_km" placeholder="000000"></div>
        </div>
        <label>Observaciones Mecánicas</label>
        <textarea id="tec_obs" rows="4" placeholder="Detalles de motor, luces, etc."></textarea>
        <button class="btn-main btn-blue" onclick="alert('Funcionalidad de PDF Técnico en desarrollo')">GENERAR FICHA TÉCNICA</button>
    </div>

    <div id="danos" class="content">
        <div class="section-title">Registro de Daños Adicionales</div>
        <p style="font-size: 11px; color: #666;">Use esta sección para detalles específicos que no se ven en las fotos generales.</p>
        <div id="extra-photos-container"></div>
        <button class="btn-main btn-orange" onclick="document.getElementById('add-extra').click()">+ AGREGAR FOTO DE DAÑO</button>
        <input type="file" id="add-extra" style="display:none" accept="image/*" capture="camera" onchange="addExtraPhoto(this)">
    </div>
</div>

<script>
    let sigCliente;
    let localData = {};
    let currentMode = 'entrega';
    const listaPaneles = [
        "Capot", "Parrilla", "Guardabarro Delantero L/C", "Guardabarro Delantero Izquierdo",
        "Puerta Conductor", "Puerta Trasera L/C", "Guardabarro Trasero L/C", "Baul",
        "Paragolpe Trasero", "Guardabarro Trasero L/A", "Puerta Trasera L/A", "Puerta Acompañante",
        "Guardabarro Delantero L/A", "Rueda C/D", "Rueda C/T", "Rueda A/D", "Rueda A/T",
        "Techo", "Parabrisas", "Motor", "Interior", "Asientos Delanteros", "Asientos Traseros", "Rueda Auxilio"
    ];

    window.onload = () => {
        const canvas = document.getElementById('sig-cliente');
        sigCliente = new SignaturePad(canvas);
        renderPaneles();
        resizeCanvas(canvas);
    };

    function resizeCanvas(canvas) {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function switchTab(tab) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        if(tab === 'entrega') document.getElementById('t1').classList.add('active');
        if(tab === 'mecanica') document.getElementById('t2').classList.add('active');
        if(tab === 'danos') document.getElementById('t3').classList.add('active');
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-ent').classList.toggle('active', mode === 'entrega');
        document.getElementById('mode-dev').classList.toggle('active', mode === 'devolucion');
    }

    function renderPaneles() {
        const grid = document.getElementById('grid-paneles');
        listaPaneles.forEach((nombre, index) => {
            const idSafe = `p${index}`;
            const div = document.createElement('div');
            div.className = 'panel-card';
            div.innerHTML = `
                <span class="panel-label">${nombre.toUpperCase()}</span>
                <input type="file" accept="image/*" capture="camera" onchange="processPanel(this, '${idSafe}')" style="font-size:10px; width:100%">
                <div class="thumb-container">
                    <img id="prev_${idSafe}_old" class="thumb" title="Entrega">
                    <img id="prev_${idSafe}_new" class="thumb" title="Devolución">
                </div>
            `;
            grid.appendChild(div);
        });
    }

    function processPanel(input, idSafe) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const targetId = currentMode === 'devolucion' ? `prev_${idSafe}_new` : `prev_${idSafe}_old`;
            const img = document.getElementById(targetId);
            img.src = e.target.result;
            img.style.display = 'block';
            localData[targetId] = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function addExtraPhoto(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const container = document.getElementById('extra-photos-container');
            const div = document.createElement('div');
            div.className = 'extra-photo-item';
            div.innerHTML = `<img src="${e.target.result}" class="extra-thumb"><input type="text" placeholder="Descripción del daño...">`;
            container.appendChild(div);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function loadHistory() {
        const pat = document.getElementById('pat_comp').value.toUpperCase();
        const saved = localStorage.getItem('maximo_' + pat);
        document.querySelectorAll('.thumb').forEach(img => { img.src = ''; img.style.display = 'none'; });
        if (saved) {
            localData = JSON.parse(saved);
            listaPaneles.forEach((_, index) => {
                const idSafe = `p${index}`;
                if(localData[`prev_${idSafe}_old`]) {
                    const img = document.getElementById(`prev_${idSafe}_old`);
                    img.src = localData[`prev_${idSafe}_old`];
                    img.style.display = 'block';
                }
            });
            setMode('devolucion');
        } else {
            localData = {};
            setMode('entrega');
        }
    }

    function saveToLocal() {
        const pat = document.getElementById('pat_comp').value.toUpperCase();
        if(!pat) return alert("Ingrese la patente primero");
        localStorage.setItem('maximo_' + pat, JSON.stringify(localData));
        alert("ESTADO DE ENTREGA GUARDADO EN EL DISPOSITIVO.");
    }

    function genPDFComp() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pat = document.getElementById('pat_comp').value.toUpperCase() || "S-P";

        doc.setFillColor(26, 26, 26); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("MAXIMO RENT A CAR", 20, 25);
        
        let y = 60;
        listaPaneles.forEach((nombre, index) => {
            const idSafe = `p${index}`;
            const o = document.getElementById(`prev_${idSafe}_old`);
            const n = document.getElementById(`prev_${idSafe}_new`);
            if(o.src.startsWith('data') || n.src.startsWith('data')) {
                if(y > 240) { doc.addPage(); y = 20; }
                doc.setTextColor(0); doc.setFontSize(10); doc.text(nombre.toUpperCase(), 20, y);
                if(o.src.startsWith('data')) doc.addImage(o.src, 'JPEG', 20, y+5, 80, 50);
                if(n.src.startsWith('data')) doc.addImage(n.src, 'JPEG', 110, y+5, 80, 50);
                y += 65;
            }
        });
        
        if(!sigCliente.isEmpty()) {
            if(y > 250) doc.addPage();
            doc.text("FIRMA CONFORMIDAD:", 20, 260);
            doc.addImage(sigCliente.toDataURL(), 'PNG', 20, 265, 50, 20);
        }
        
        doc.save(`Estado_${pat}.pdf`);
    }
</script>
</body>
</html>
