<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Rent A Car - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #1a1a1a; --accent: #0056b3; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #ddd; padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: none; color: #666; font-size: 0.9em; }
        .tab-btn.active { background: white; color: var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 15px; padding-bottom: 10px; }
        .section { background: var(--primary); color: white; padding: 8px 12px; font-weight: bold; margin: 15px 0 10px; border-radius: 6px; font-size: 0.8em; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px; font-weight: 600; font-size: 0.85em; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .photo-entry { border: 1px solid #eee; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: #fafafa; position: relative; }
        .preview-img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; margin-top: 10px; display: none; background: #000; }
        
        .btn-add { background: #28a745; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; width: 100%; cursor: pointer; }
        .btn-pdf { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 1.1em; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">Maximo Rent A Car</h2>
        <small>GESTIÓN PROFESIONAL DE FLOTA</small>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'mecanica')">Inspección Técnica</button>
        <button class="tab-btn" onclick="openTab(event, 'danos')">Reporte de Daños</button>
    </div>

    <div id="mecanica" class="tab-content active">
        <div class="section">1. Datos de Unidad</div>
        <label>Vehículo / Patente</label>
        <input type="text" id="auto_m" placeholder="Ej: Cronos AE123CC">
        <label>Kilometraje</label>
        <input type="number" id="km_m" placeholder="KM actuales">

        <div class="section">2. Fluidos y Mecánica</div>
        <div class="grid">
            <div><label>Aceite</label><select id="aceite"><option>OK</option><option>BAJO</option><option>CAMBIO</option></select></div>
            <div><label>Refrigerante</label><select id="agua"><option>OK</option><option>BAJO</option></select></div>
        </div>
        <div class="grid">
            <div><label>Líq. Frenos</label><select id="frenos"><option>OK</option><option>BAJO</option></select></div>
            <div><label>Líq. Hidráulico</label><select id="hidraulico"><option>OK</option><option>BAJO</option><option>N/A</option></select></div>
        </div>

        <div class="section">3. Seguridad y Otros</div>
        <div class="grid">
            <div><label>Luces/Giros</label><select id="luces"><option>OK</option><option>FALLA</option></select></div>
            <div><label>Neumáticos</label><select id="ruedas"><option>OK</option><option>REVISAR</option></select></div>
        </div>
        <div class="grid">
            <div><label>Extintor Vto.</label><input type="text" id="extintor" placeholder="Mes/Año"></div>
            <div><label>Agua Zorrino</label><select id="zorrino"><option>OK</option><option>VACÍO</option></select></div>
        </div>

        <label>Observaciones Generales</label>
        <textarea id="obs_m" rows="3"></textarea>
        <button class="btn-pdf" onclick="generarPDFMecanico()">DESCARGAR INSPECCIÓN TÉCNICA</button>
    </div>

    <div id="danos" class="tab-content">
        <div class="section">Identificación</div>
        <input type="text" id="auto_d" placeholder="Patente del vehículo">
        
        <div class="section">Fotos de Daños</div>
        <div id="lista-fotos">
            </div>
        
        <button class="btn-add" onclick="agregarFoto()">+ AGREGAR OTRA FOTO</button>
        <button class="btn-pdf" onclick="generarPDFDanos()" style="background: #e67e22;">DESCARGAR REPORTE DE DAÑOS</button>
    </div>
</div>

<script>
    let fotoCount = 0;

    function openTab(evt, tabName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function agregarFoto() {
        fotoCount++;
        const div = document.createElement('div');
        div.className = 'photo-entry';
        div.innerHTML = `
            <label>Evidencia #${fotoCount}</label>
            <input type="file" accept="image/*" capture="camera" onchange="previewFile(this, 'img-${fotoCount}')">
            <img id="img-${fotoCount}" class="preview-img">
            <textarea id="txt-${fotoCount}" placeholder="Describa el daño o pieza afectada..." style="margin-top:8px"></textarea>
        `;
        document.getElementById('lista-fotos').appendChild(div);
    }

    function previewFile(input, imgId) {
        const preview = document.getElementById(imgId);
        const file = input.files[0];
        const reader = new FileReader();
        reader.onloadend = () => { 
            preview.src = reader.result; 
            preview.style.display = "block"; 
        }
        if (file) reader.readAsDataURL(file);
    }

    function generarPDFMecanico() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(30, 30, 30); doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("MAXIMO RENT A CAR", 20, 20);
        doc.setFontSize(10); doc.text("INSPECCIÓN TÉCNICA DE UNIDAD", 20, 27);
        
        doc.setTextColor(0); doc.setFontSize(11);
        let y = 45;
        const f = (l, v) => { 
            doc.setFont("helvetica", "bold"); doc.text(l, 20, y);
            doc.setFont("helvetica", "normal"); doc.text(String(v), 80, y);
            doc.setDrawColor(230); doc.line(20, y+2, 190, y+2); y += 10;
        };

        f("FECHA:", new Date().toLocaleDateString());
        f("VEHÍCULO:", document.getElementById('auto_m').value.toUpperCase());
        f("KILOMETRAJE:", document.getElementById('km_m').value + " KM");
        f("ACEITE:", document.getElementById('aceite').value);
        f("REFRIGERANTE:", document.getElementById('agua').value);
        f("LÍQ. FRENOS:", document.getElementById('frenos').value);
        f("HIDRÁULICO:", document.getElementById('hidraulico').value);
        f("LUCES:", document.getElementById('luces').value);
        f("NEUMÁTICOS:", document.getElementById('ruedas').value);
        f("EXTINTOR:", document.getElementById('extintor').value);
        f("ZORRINO:", document.getElementById('zorrino').value);
        
        y += 5;
        doc.setFont("helvetica", "bold"); doc.text("OBSERVACIONES:", 20, y);
        const lineas = doc.splitTextToSize(document.getElementById('obs_m').value || "Sin observaciones.", 170);
        doc.setFont("helvetica", "normal"); doc.text(lineas, 20, y + 8);
        
        doc.save(`Check_Mecanico_${document.getElementById('auto_m').value}.pdf`);
    }

    async function generarPDFDanos() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFillColor(230, 126, 34); doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("REPORTE DE DAÑOS", 20, 20);
        
        doc.setTextColor(0); doc.setFontSize(12);
        doc.text(`Vehículo: ${document.getElementById('auto_d').value.toUpperCase()}`, 20, 42);
        doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 20, 50);

        let y = 60;
        for (let i = 1; i <= fotoCount; i++) {
            const img = document.getElementById(`img-${i}`);
            const txt = document.getElementById(`txt-${i}`).value;
            
            if (img && img.src.startsWith('data:image')) {
                if (y > 220) { doc.addPage(); y = 20; }
                
                doc.setFontSize(10); doc.setFont("helvetica", "bold");
                doc.text(`EVIDENCIA #${i}:`, 20, y);
                y += 5;
                
                // Imagen centrada
                doc.addImage(img.src, 'JPEG', 20, y, 90, 65);
                
                // Texto al lado
                doc.setFont("helvetica", "normal");
                const desc = doc.splitTextToSize(txt || "Sin aclaración.", 80);
                doc.text(desc, 115, y + 5);
                
                y += 75;
            }
        }
        doc.save(`Danos_${document.getElementById('auto_d').value}.pdf`);
    }

    // Inicializar con una foto vacía
    agregarFoto();
</script>
</body>
</html>
