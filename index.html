<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Check Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary: #1a1a1a; --accent: #0056b3; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: #e9ecef; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px 5px; border: 2px solid #ddd; border-radius: 10px; font-weight: bold; background: #f8f9fa; color: #555; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section { background: var(--primary); color: white; padding: 10px; font-weight: bold; margin: 20px 0 10px; border-radius: 6px; font-size: 12px; text-transform: uppercase; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; color: #333; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ced4da; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sig-wrapper { border: 2px dashed #adb5bd; background: #f8f9fa; border-radius: 10px; margin-top: 10px; height: 180px; }
        #signature-pad { width: 100%; height: 100%; touch-action: none; }
        .btn-pdf { width: 100%; background: #28a745; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 25px; }
        .btn-danos { background: #fd7e14; }
        .photo-entry { border: 2px solid #dee2e6; padding: 12px; border-radius: 10px; margin-bottom: 15px; background: #fff; }
        .preview-img { width: 100%; border-radius: 6px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">MAXIMO <span style="color:var(--accent)">RENT A CAR</span></h2>
    </header>

    <div class="tabs">
        <button id="btn-m" class="tab-btn active" onclick="showTab('mecanica')">INSPECCIÓN</button>
        <button id="btn-d" class="tab-btn" onclick="showTab('danos')">DAÑOS</button>
    </div>

    <div id="mecanica" class="tab-content active">
        <label>Empleado</label>
        <input type="text" id="emp_m" placeholder="Nombre completo" oninput="document.getElementById('emp_d').value = this.value">
        <div class="grid">
            <div><label>Patente</label><input type="text" id="pat_m" placeholder="ABC-123"></div>
            <div><label>KM</label><input type="number" id="km_m"></div>
        </div>
        <div class="section">Fluidos y Mecánica</div>
        <div class="grid">
            <div><label>Aceite</label><select id="aceite"><option>OK</option><option>BAJO</option></select></div>
            <div><label>Agua/Refri.</label><select id="agua"><option>OK</option><option>BAJO</option></select></div>
        </div>
        <div class="grid">
            <div><label>Líq. Frenos</label><select id="frenos"><option>OK</option><option>BAJO</option></select></div>
            <div><label>Líq. Hidráulico</label><select id="hidraulico"><option>OK</option><option>BAJO</option><option>N/A</option></select></div>
        </div>
        <div class="section">Seguridad y Luces</div>
        <div class="grid">
            <div><label>Luces/Giros</label><select id="luces"><option>OK</option><option>FALLA</option></select></div>
            <div><label>Neumáticos</label><select id="ruedas"><option>OK</option><option>REVISAR</option></select></div>
        </div>
        <div class="grid">
            <div><label>Extintor Vto.</label><input type="text" id="ext_m" placeholder="MM/AA"></div>
            <div><label>Agua Zorrino</label><select id="zorrino"><option>OK</option><option>VACÍO</option></select></div>
        </div>
        <label>Observaciones</label>
        <textarea id="obs_m" rows="2"></textarea>
        <div class="section">Firma Responsable</div>
        <div class="sig-wrapper"><canvas id="signature-pad"></canvas></div>
        <button onclick="pad.clear()" style="margin-top:8px; width:100%; padding:8px;">Limpiar Firma</button>
        <button class="btn-pdf" onclick="saveMecanico()">DESCARGAR REPORTE TÉCNICO</button>
    </div>

    <div id="danos" class="tab-content">
        <label>Empleado</label><input type="text" id="emp_d" readonly>
        <label>Patente</label><input type="text" id="pat_d" placeholder="Patente para reporte">
        <div id="contenedor-fotos"></div>
        <button onclick="nuevaFoto()" style="width:100%; padding:15px; margin-top:15px; background:#6c757d; color:white; border:none; border-radius:10px; font-weight:bold">+ AGREGAR DAÑO</button>
        <button class="btn-pdf btn-danos" onclick="saveDanos()">DESCARGAR REPORTE DE DAÑOS</button>
    </div>
</div>

<script>
    let pad; let fotoIndex = 0;
    window.onload = () => { initPad(); nuevaFoto(); };
    function initPad() {
        const canvas = document.getElementById('signature-pad');
        pad = new SignaturePad(canvas);
        const resize = () => {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        };
        window.onresize = resize; resize();
    }
    function showTab(name) {
        document.getElementById('mecanica').style.display = (name === 'mecanica') ? 'block' : 'none';
        document.getElementById('danos').style.display = (name === 'danos') ? 'block' : 'none';
        document.getElementById('btn-m').classList.toggle('active', name === 'mecanica');
        document.getElementById('btn-d').classList.toggle('active', name === 'danos');
        if(name === 'mecanica') initPad();
    }
    function nuevaFoto() {
        fotoIndex++;
        const div = document.createElement('div');
        div.className = 'photo-entry';
        div.innerHTML = `<label>Evidencia #${fotoIndex}</label><input type="file" accept="image/*" capture="camera" onchange="preview(this, 'img${fotoIndex}')"><img id="img${fotoIndex}" class="preview-img"><textarea id="txt${fotoIndex}" placeholder="Descripción del daño..." style="margin-top:10px"></textarea>`;
        document.getElementById('contenedor-fotos').appendChild(div);
    }
    function preview(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { const img = document.getElementById(id); img.src = e.target.result; img.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }
    function saveMecanico() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const p = document.getElementById('pat_m').value.toUpperCase() || "S-D";
        doc.setFillColor(26, 26, 26); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(22); doc.text("MAXIMO RENT A CAR", 20, 25);
        doc.setFontSize(10); doc.text("REPORTE TÉCNICO DE INSPECCIÓN", 20, 33);
        doc.setTextColor(0); let y = 55;
        const row = (l, v) => {
            doc.setFillColor(245); doc.rect(20, y-5, 170, 8, 'F');
            doc.setFont("helvetica", "bold"); doc.text(l, 25, y);
            doc.setFont("helvetica", "normal"); doc.text(String(v), 85, y);
            y += 10;
        };
        row("EMPLEADO", document.getElementById('emp_m').value);
        row("FECHA", new Date().toLocaleDateString());
        row("PATENTE", p); row("KM", document.getElementById('km_m').value);
        row("ACEITE", document.getElementById('aceite').value); row("AGUA", document.getElementById('agua').value);
        row("FRENOS", document.getElementById('frenos').value); row("HIDRÁULICO", document.getElementById('hidraulico').value);
        row("LUCES", document.getElementById('luces').value); row("NEUMÁTICOS", document.getElementById('ruedas').value);
        row("EXTINTOR", document.getElementById('ext_m').value); row("ZORRINO", document.getElementById('zorrino').value);
        doc.setFont("helvetica", "bold"); doc.text("OBSERVACIONES:", 20, y + 5);
        doc.setFont("helvetica", "normal"); doc.text(doc.splitTextToSize(document.getElementById('obs_m').value || "-", 170), 20, y + 13);
        if (!pad.isEmpty()) {
            doc.text("FIRMA DEL RESPONSABLE:", 20, 245);
            doc.addImage(pad.toDataURL(), 'PNG', 20, 250, 50, 20);
            doc.line(20, 270, 70, 270);
        }
        doc.save(`Check_${p}.pdf`);
    }
    async function saveDanos() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const p = document.getElementById('pat_d').value.toUpperCase() || "S-D";
        doc.setFillColor(211, 84, 0); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(22); doc.text("REPORTE DE DAÑOS", 20, 25);
        doc.setFontSize(10); doc.text("AUDITORÍA VISUAL DE CARROCERÍA", 20, 33);
        doc.setTextColor(0); doc.text(`Vehículo: ${p}`, 20, 50); doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 150, 50);
        let y = 60;
        for (let i = 1; i <= fotoIndex; i++) {
            const img = document.getElementById(`img${i}`);
            if (img && img.src.startsWith('data')) {
                if (y > 200) { doc.addPage(); y = 20; }
                doc.setDrawColor(200); doc.rect(19, y - 5, 172, 80);
                doc.addImage(img.src, 'JPEG', 25, y, 95, 70);
                doc.setFont("helvetica", "bold"); doc.text("DETALLE:", 125, y + 10);
                doc.setFont("helvetica", "normal"); doc.text(doc.splitTextToSize(document.getElementById(`txt${i}`).value || "Sin descripción.", 60), 125, y + 18);
                y += 90;
            }
        }
        doc.save(`Danos_${p}.pdf`);
    }
</script>
</body>
</html>
