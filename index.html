<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Rent A Car v3</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --main: #1a1a1a; --blue: #0056b3; --orange: #e67e22; --green: #27ae60; --gray: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: #d1d8e0; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        header { background: var(--main); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--blue); }
        .logo-img { max-width: 120px; height: auto; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        
        .tabs { display: flex; background: #eee; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; font-weight: bold; cursor: pointer; background: none; transition: 0.3s; font-size: 11px; border-radius: 10px; }
        .tab-btn.active { background: white; color: var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .content { padding: 20px; display: none; }
        .content.active { display: block !important; }

        .section-title { background: #f8f9fa; color: var(--blue); padding: 8px; font-weight: bold; border-left: 4px solid var(--blue); margin: 20px 0 10px; font-size: 13px; text-transform: uppercase; }
        
        label { display: block; margin: 15px 0 5px; font-weight: 700; font-size: 14px; color: #444; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .sig-container { border: 2px dashed #ccc; background: #fafafa; border-radius: 15px; margin-top: 10px; height: 180px; }
        #signature-pad { width: 100%; height: 100%; touch-action: none; }
        
        .btn-main { width: 100%; padding: 20px; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; margin-top: 20px; }
        .btn-check { background: var(--blue); }
        .btn-danos { background: var(--orange); }
        .btn-entrega { background: var(--green); }

        .card-foto { border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 20px; background: #fdfdfd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .img-prev { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }

        /* Estilos específicos para el secuenciador de fotos */
        #foto-indicador { background: #fff3cd; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #ffeeba; margin-bottom: 10px; font-weight: bold; color: #856404; }
        .btn-secuencial { background: #444; color: white; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .progreso-fotos { font-size: 12px; color: #666; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Maximo Rent A Car" class="logo-img">
        <h2 style="margin:0; letter-spacing: 1px; font-size: 18px;">MAXIMO <span style="color:var(--blue)">RENT A CAR</span></h2>
    </header>

    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="switchTab('mecanica')">INSPECCIÓN</button>
        <button id="t2" class="tab-btn" onclick="switchTab('danos')">DAÑOS</button>
        <button id="t3" class="tab-btn" onclick="switchTab('entregas')">ENTREGAS</button>
    </div>

    <div id="mecanica" class="content active">
        <label>Nombre del Empleado</label>
        <input type="text" id="emp" placeholder="Escriba su nombre">
        <div class="grid">
            <div><label>Patente</label><input type="text" id="pat1" placeholder="ABC-123"></div>
            <div><label>KM</label><input type="number" id="km"></div>
        </div>
        <div class="section-title">Fluidos y Mecánica</div>
        <div class="grid">
            <div><label>Aceite</label><select id="oil"><option>OK</option><option>BAJO</option></select></div>
            <div><label>Agua</label><select id="wat"><option>OK</option><option>BAJO</option></select></div>
        </div>
        <div class="grid">
            <div><label>Frenos</label><select id="fre"><option>OK</option><option>BAJO</option></select></div>
            <div><label>Hidráulico</label><select id="hid"><option>OK</option><option>BAJO</option><option>N/A</option></select></div>
        </div>
        <div class="section-title">Seguridad</div>
        <div class="grid">
            <div><label>Luces</label><select id="luc"><option>OK</option><option>FALLA</option></select></div>
            <div><label>Gomas</label><select id="neu"><option>OK</option><option>REVISAR</option></select></div>
        </div>
        <div class="grid">
            <div><label>Extintor</label><input type="text" id="ext" placeholder="Vto"></div>
            <div><label>Zorrino</label><select id="zor"><option>OK</option><option>VACÍO</option></select></div>
        </div>
        <label>Observaciones</label>
        <textarea id="obs" rows="2"></textarea>
        <div class="section-title">Firma del Responsable</div>
        <div class="sig-container"><canvas id="signature-pad"></canvas></div>
        <button onclick="signaturePad.clear()" style="width:100%; margin-top:10px; padding:10px; border-radius:10px;">BORRAR FIRMA</button>
        <button class="btn-main btn-check" onclick="generarCheck()">DESCARGAR REPORTE TÉCNICO</button>
    </div>

    <div id="danos" class="content">
        <label>Patente Vehículo</label>
        <input type="text" id="pat2" placeholder="Patente para daños">
        <div id="lista-fotos" style="margin-top:20px;"></div>
        <button onclick="nuevaFoto('lista-fotos')" style="width:100%; padding:15px; background:#666; color:white; border:none; border-radius:12px; font-weight:bold;">+ AGREGAR FOTO DE DAÑO</button>
        <button class="btn-main btn-danos" onclick="generarDanos()">DESCARGAR REPORTE DE DAÑOS</button>
    </div>

    <div id="entregas" class="content">
        <label>Tipo de Movimiento</label>
        <select id="mov_tipo"><option>ENTREGA</option><option>DEVOLUCIÓN</option></select>
        <div class="grid">
            <div><label>Patente</label><input type="text" id="pat3" placeholder="ABC-123"></div>
            <div><label>Kilometraje</label><input type="number" id="km_mov"></div>
        </div>
        <label>Nivel de Combustible</label>
        <select id="fuel_mov">
            <option>1/8 (Reserva)</option><option>1/4</option><option>1/2</option><option>3/4</option><option>Lleno</option>
        </select>
        
        <div class="section-title">Registro Fotográfico Unidad</div>
        <div id="foto-indicador">SIGUIENTE: <span id="nombre-parte">RUEDA C/D</span></div>
        
        <input type="file" id="input-secuencial" accept="image/*" capture="camera" style="display:none" onchange="capturarFotoSecuencial(this)">
        <button class="btn-secuencial" onclick="document.getElementById('input-secuencial').click()">
            📸 TOMAR FOTO
        </button>
        <div id="progreso-texto" class="progreso-fotos">0 de 21 fotos tomadas</div>

        <div id="lista-fotos-entrega" style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            </div>

        <label>Estado General / Limpieza</label>
        <textarea id="obs_mov" rows="3" placeholder="Ej: Auto limpio..."></textarea>
        <button class="btn-main btn-entrega" onclick="generarMovimiento()">DESCARGAR REPORTE MOVIMIENTO</button>
    </div>
</div>

<script>
    let signaturePad;
    let fotoCount = 0;
    
    // Lista secuencial de fotos
    const listaPartes = [
        "RUEDA C/D", "RUEDA C/T", "RUEDA A/D", "RUEDA A/T", "CAPOT", "PARAGOLPE D", 
        "GUARDABARRO C/D", "PUERTA C", "PUERTA C/T", "GUARDABARRO C/T", "BAUL", 
        "GUARDABARRO A/T", "PUERTA A/T", "PUERTA A", "GUARDABARRO A/D", "TECHO", 
        "PARABRISAS", "INTERIOR", "ASIENTOS TRASEROS", "MOTOR", "RUEDA AUXILIO"
    ];
    let parteActualIndex = 0;
    let fotosEntregas = [];

    window.onload = () => {
        const canvas = document.getElementById('signature-pad');
        signaturePad = new SignaturePad(canvas);
        const resize = () => {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        };
        window.onresize = resize; resize();
    };

    function switchTab(tab) {
        document.getElementById('mecanica').classList.remove('active');
        document.getElementById('danos').classList.remove('active');
        document.getElementById('entregas').classList.remove('active');
        document.getElementById('t1').classList.remove('active');
        document.getElementById('t2').classList.remove('active');
        document.getElementById('t3').classList.remove('active');
        document.getElementById(tab).classList.add('active');
        if(tab === 'mecanica') document.getElementById('t1').classList.add('active');
        if(tab === 'danos') document.getElementById('t2').classList.add('active');
        if(tab === 'entregas') document.getElementById('t3').classList.add('active');
    }

    // Función para DAÑOS (Tradicional)
    function nuevaFoto(contenedorId) {
        fotoCount++;
        const div = document.createElement('div');
        div.className = 'card-foto';
        div.innerHTML = `
            <label style="color:var(--orange)">DAÑO #${fotoCount}</label>
            <input type="file" accept="image/*" capture="camera" onchange="readImg(this, 'p${fotoCount}')">
            <img id="p${fotoCount}" class="img-prev img-danos-file">
            <textarea placeholder="Descripción del daño..." style="margin-top:10px"></textarea>`;
        document.getElementById(contenedorId).appendChild(div);
    }

    // Captura secuencial para ENTREGAS
    function capturarFotoSecuencial(input) {
        if (input.files && input.files[0] && parteActualIndex < listaPartes.length) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const nombreParte = listaPartes[parteActualIndex];
                
                // Guardar en array de datos
                fotosEntregas.push({
                    nombre: nombreParte,
                    src: e.target.result
                });

                // Crear miniatura en pantalla
                const div = document.createElement('div');
                div.style = "background:#eee; border-radius:10px; padding:5px; text-align:center; font-size:10px;";
                div.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:5px;"><br><b>${nombreParte}</b>`;
                document.getElementById('lista-fotos-entrega').appendChild(div);

                // Avanzar al siguiente
                parteActualIndex++;
                actualizarInterfazSecuencial();
            };
            reader.readAsDataURL(input.files[0]);
            input.value = ""; // Limpiar input para re-uso
        }
    }

    function actualizarInterfazSecuencial() {
        const indicador = document.getElementById('nombre-parte');
        const progreso = document.getElementById('progreso-texto');
        
        if (parteActualIndex < listaPartes.length) {
            indicador.innerText = listaPartes[parteActualIndex];
            progreso.innerText = `${parteActualIndex} de 21 fotos tomadas`;
        } else {
            document.getElementById('foto-indicador').innerHTML = "✅ TODAS LAS FOTOS TOMADAS";
            document.querySelector('.btn-secuencial').style.display = 'none';
            progreso.innerText = "21 de 21 fotos completadas";
        }
    }

    function readImg(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                const img = document.getElementById(id);
                img.src = e.target.result; img.style.display = 'block'; 
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // GENERACIÓN DE PDFs
    function generarCheck() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const p = (document.getElementById('pat1').value || "S/D").toUpperCase();
        doc.setFillColor(26, 26, 26); doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255); doc.setFontSize(24); doc.text("MAXIMO RENT A CAR", 20, 25);
        doc.setFontSize(10); doc.text("REPORTE TÉCNICO DE AUDITORÍA", 20, 35);
        let y = 60;
        const fila = (tit, val) => {
            doc.setFillColor(245); doc.rect(20, y-5, 170, 8, 'F');
            doc.setFont("helvetica", "bold"); doc.setTextColor(0); doc.text(tit, 25, y);
            doc.setFont("helvetica", "normal"); doc.text(String(val), 80, y);
            y += 10;
        };
        fila("EMPLEADO:", document.getElementById('emp').value);
        fila("FECHA:", new Date().toLocaleDateString());
        fila("PATENTE:", p);
        fila("KILOMETRAJE:", document.getElementById('km').value + " KM");
        fila("ACEITE:", document.getElementById('oil').value);
        fila("AGUA:", document.getElementById('wat').value);
        fila("FRENOS:", document.getElementById('fre').value);
        fila("HIDRÁULICO:", document.getElementById('hid').value);
        fila("LUCES:", document.getElementById('luc').value);
        fila("NEUMÁTICOS:", document.getElementById('neu').value);
        fila("EXTINTOR:", document.getElementById('ext').value);
        fila("ZORRINO:", document.getElementById('zor').value);
        if(!signaturePad.isEmpty()) {
            doc.text("FIRMA:", 20, 250);
            doc.addImage(signaturePad.toDataURL(), 'PNG', 20, 255, 50, 20);
        }
        doc.save(`Check_${p}.pdf`);
    }

    async function generarDanos() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const p = (document.getElementById('pat2').value || "S/D").toUpperCase();
        doc.setFillColor(230, 126, 34); doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255); doc.text("REPORTE DE DAÑOS", 20, 25);
        let y = 60;
        const imgs = document.querySelectorAll('.img-danos-file');
        imgs.forEach((img, i) => {
            if(img.src.startsWith('data')) {
                if(y > 200) { doc.addPage(); y = 30; }
                doc.addImage(img.src, 'JPEG', 20, y, 90, 70);
                doc.text(`Daño #${i+1}`, 120, y+10);
                y += 80;
            }
        });
        doc.save(`Danos_${p}.pdf`);
    }

    function generarMovimiento() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const tipo = document.getElementById('mov_tipo').value;
        const p = (document.getElementById('pat3').value || "S/D").toUpperCase();
        
        doc.setFillColor(39, 174, 96); doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255); doc.setFontSize(24); doc.text(tipo, 20, 25);
        
        doc.setTextColor(0); doc.setFontSize(11);
        let y = 60;
        doc.text(`PATENTE: ${p}`, 20, y); y+=10;
        doc.text(`FECHA: ${new Date().toLocaleString()}`, 20, y); y+=10;
        doc.text(`KM: ${document.getElementById('km_mov').value}`, 20, y); y+=10;
        doc.text(`COMBUSTIBLE: ${document.getElementById('fuel_mov').value}`, 20, y); y+=15;
        
        doc.setFontSize(14); doc.text("REGISTRO FOTOGRÁFICO DE ESTADO", 20, y); y+=10;
        
        fotosEntregas.forEach((foto, index) => {
            if(y > 220) { doc.addPage(); y = 20; }
            doc.addImage(foto.src, 'JPEG', 20, y, 70, 50);
            doc.setFontSize(10); doc.text(foto.nombre, 95, y + 25);
            y += 55;
        });
        
        doc.save(`${tipo}_${p}.pdf`);
    }
</script>
</body>
</html>
