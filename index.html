<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maximo Rent A Car - Pro</title>
    
    <style>
        :root { --dark: #1a1a1a; --blue: #004085; --accent: #e67e22; --success: #28a745; --light: #f8f9fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #cbd3da; margin: 0; padding: 10px; color: #333; padding-bottom: 90px; }
        .app-container { max-width: 600px; margin: auto; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        header { background: var(--dark); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--blue); }
        .logo-text { font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        .logo-text span { color: var(--accent); }

        .nav-tabs { display: flex; background: #eee; padding: 6px; gap: 4px; }
        .tab-link { flex: 1; padding: 14px 5px; border: none; font-weight: 700; background: none; font-size: 10px; border-radius: 10px; text-transform: uppercase; color: #777; }
        .tab-link.active { background: white; color: var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .page-content { padding: 20px; display: none; }
        .page-content.active { display: block; }

        .card-header { font-size: 11px; font-weight: bold; color: var(--blue); border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 5px; text-transform: uppercase; margin-top: 10px; }
        
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 12px; font-size: 16px; margin-bottom: 15px; background: var(--light); -webkit-appearance: none; }
        label { font-size: 12px; font-weight: 700; margin-bottom: 5px; display: block; color: #555; }

        .guide-bar { position: sticky; top: 5px; z-index: 99; background: white; padding: 12px; border-radius: 18px; border: 2px solid var(--accent); margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-cam { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .photo-item { border: 1px solid #eee; padding: 8px; border-radius: 12px; text-align: center; background: #fafafa; }
        .photo-item.done { border-color: var(--success); background: #effff4; }
        .item-label { font-size: 9px; font-weight: bold; display: block; margin-bottom: 4px; color: #333; }
        .img-preview { width: 100%; height: 75px; object-fit: cover; border-radius: 8px; display: none; margin-top: 5px; border: 1px solid #ddd; }

        .sig-box { border: 2px dashed #ccc; border-radius: 15px; background: #fdfdfd; height: 160px; margin: 10px 0; }
        canvas { width: 100%; height: 100%; touch-action: none; }

        .footer-actions { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; border-top: 2px solid #ddd; display: flex; gap: 10px; box-sizing: border-box; z-index: 1000; }
        .action-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 800; font-size: 13px; color: white; text-transform: uppercase; }
        .bg-blue { background: var(--blue); }
        .bg-green { background: var(--success); }
        
        .mode-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-opt { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 12px; text-align: center; font-weight: bold; font-size: 11px; }
        .mode-opt.active { border-color: var(--blue); background: var(--blue); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-text">MAXIMO <span>RENT A CAR</span></div>
    </header>

    <div class="nav-tabs">
        <button class="tab-link active" onclick="openTab(event, 'tab-fotos')">Inspección</button>
        <button class="tab-link" onclick="openTab(event, 'tab-mecanica')">Chequeo</button>
        <button class="tab-link" onclick="openTab(event, 'tab-extras')">Daños Extra</button>
    </div>

    <div id="tab-fotos" class="page-content active">
        <div class="card-header">Unidad y Modo</div>
        <input type="text" id="patente" placeholder="PATENTE" oninput="this.value=this.value.toUpperCase(); syncData();">
        
        <div class="mode-box">
            <div id="m-ent" class="mode-opt active" onclick="setOpMode('entrega')">SALIDA</div>
            <div id="m-dev" class="mode-opt" onclick="setOpMode('devolucion')">ENTRADA</div>
        </div>

        <div class="guide-bar">
            <div id="guide-text" style="font-size: 10px; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 5px;">PASO 1: CAPOT</div>
            <button class="btn-cam" id="btn-main-action" onclick="openCurrentInput()">📷 TOMAR FOTO</button>
        </div>

        <div class="photo-grid" id="main-grid"></div>

        <div class="card-header">Firma de Conformidad</div>
        <div class="sig-box"><canvas id="canvas-firma"></canvas></div>
        <button onclick="signaturePad.clear()" style="width:100%; border:none; text-decoration:underline; font-size:10px; color:#666; background:none; padding:10px;">Borrar Firma</button>
    </div>

    <div id="tab-mecanica" class="page-content">
        <div class="card-header">Líquidos y Mecánica</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>Aceite</label><select id="c_oil"><option>Correcto</option><option>Bajo</option><option>Cambio</option></select></div>
            <div><label>Agua/Refrig.</label><select id="c_water"><option>Correcto</option><option>Bajo</option></select></div>
        </div>
        
        <div class="card-header">Seguridad y Funcionamiento</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>Frenos</label><select id="c_brakes"><option>OK</option><option>Revisar</option></select></div>
            <div><label>Luces</label><select id="c_lights"><option>Funcionan</option><option>Falla</option></select></div>
        </div>

        <div class="card-header">Entrega</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>Neumáticos</label><select id="c_tires"><option>Buenos</option><option>Gastados</option></select></div>
            <div><label>Combustible</label><select id="c_fuel"><option>Full</option><option>3/4</option><option>1/2</option><option>1/4</option><option>Reserva</option></select></div>
        </div>
        
        <label>Kilometraje (KM)</label>
        <input type="number" id="c_km" placeholder="Ej: 85000">
        
        <label>Observaciones Generales</label>
        <textarea id="c_obs" rows="5" placeholder="Detalle cualquier novedad técnica..."></textarea>
    </div>

    <div id="tab-extras" class="page-content">
        <div class="card-header">Galería de Daños Extra</div>
        <div id="extra-list"></div>
        <button class="action-btn bg-blue" onclick="document.getElementById('input-extra').click()" style="width:100%">+ FOTO DE DAÑO ESPECÍFICO</button>
        <input type="file" id="input-extra" style="display:none" accept="image/*" capture="camera" onchange="processExtra(this)">
    </div>
</div>

<div class="footer-actions">
    <button class="action-btn bg-green" onclick="saveToStorage()">💾 GUARDAR</button>
    <button class="action-btn bg-blue" onclick="generateProfessionalPDF()">📄 GENERAR PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<script>
    const panels = ["Capot", "Parrilla", "G-Barro D-I", "G-Barro D-D", "Puerta Cond.", "Puerta T-I", "Puerta Acomp.", "Puerta T-D", "G-Barro T-I", "G-Barro T-D", "Baul", "Paragolpe Tras.", "Rueda D-I", "Rueda D-D", "Rueda T-I", "Rueda T-D", "Techo", "Parabrisas", "Motor", "Interior Del.", "Interior Tras.", "Baul Int.", "Auxilio", "Herramientas"];
    let currentIdx = 0;
    let mode = 'entrega';
    let data = { extras: [] };
    let signaturePad;

    window.onload = () => {
        signaturePad = new SignaturePad(document.getElementById('canvas-firma'));
        initGrid();
        resizeCanvas();
    };

    function resizeCanvas() {
        const canvas = document.getElementById('canvas-firma');
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function initGrid() {
        const grid = document.getElementById('main-grid');
        panels.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'photo-item';
            div.id = `item-${i}`;
            div.innerHTML = `<span class="item-label">${p}</span>
                <input type="file" id="file-${i}" accept="image/*" capture="camera" style="display:none" onchange="handleFile(${i})">
                <img id="prev-${i}-ent" class="img-preview"><img id="prev-${i}-dev" class="img-preview">`;
            grid.appendChild(div);
        });
    }

    function openCurrentInput() {
        if(currentIdx < panels.length) document.getElementById(`file-${currentIdx}`).click();
    }

    function handleFile(i) {
        const file = document.getElementById(`file-${i}`).files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const key = mode === 'entrega' ? `img-${i}-ent` : `img-${i}-dev`;
            data[key] = e.target.result;
            const img = document.getElementById(`prev-${i}-${mode==='entrega'?'ent':'dev'}`);
            img.src = e.target.result; img.style.display = 'block';
            document.getElementById(`item-${i}`).classList.add('done');
            if(i === currentIdx) { currentIdx++; updateGuide(); }
        };
        reader.readAsDataURL(file);
    }

    function updateGuide() {
        const btn = document.getElementById('btn-main-action');
        const txt = document.getElementById('guide-text');
        if(currentIdx < panels.length) {
            btn.innerText = `📷 TOMAR: ${panels[currentIdx].toUpperCase()}`;
            txt.innerText = `SIGUIENTE: ${panels[currentIdx]}`;
        } else {
            btn.innerText = `✓ AUDITORÍA COMPLETA`;
            btn.style.background = '#28a745';
        }
    }

    function openTab(evt, tabId) {
        document.querySelectorAll('.page-content, .tab-link').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function setOpMode(m) {
        mode = m;
        document.getElementById('m-ent').className = 'mode-opt' + (m==='entrega'?' active':'');
        document.getElementById('m-dev').className = 'mode-opt' + (m==='devolucion'?' active':'');
        currentIdx = 0; updateGuide();
    }

    function processExtra(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const id = Date.now();
            data.extras.push({ id, src: e.target.result, note: "" });
            const div = document.createElement('div');
            div.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-top:10px;"><input type="text" placeholder="¿Qué daño es?" onchange="updateExtra(${id}, this.value)">`;
            document.getElementById('extra-list').appendChild(div);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function updateExtra(id, val) {
        const ex = data.extras.find(x => x.id === id); if(ex) ex.note = val;
    }

    function saveToStorage() {
        const pat = document.getElementById('patente').value;
        if(!pat) return alert("Ingrese la patente primero");
        localStorage.setItem('maximo_' + pat, JSON.stringify(data));
        alert("✓ Datos guardados exitosamente");
    }

    function generateProfessionalPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pat = document.getElementById('patente').value || "S-P";
        const isEnt = (mode === 'entrega');

        doc.setFillColor(26, 26, 26); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(22); doc.text("MAXIMO RENT A CAR", 20, 20);
        doc.setFontSize(10); doc.text(`REPORTE DE ${isEnt ? 'SALIDA' : 'ENTRADA'} - UNIDAD: ${pat}`, 20, 30);
        
        doc.setTextColor(0); doc.setFontSize(12); doc.text("ESTADO DEL VEHÍCULO", 20, 50);
        doc.setFontSize(9);
        const tInfo = [`KM: ${document.getElementById('c_km').value}`, `Nafta: ${document.getElementById('c_fuel').value}`, `Aceite: ${document.getElementById('c_oil').value}`];
        doc.text(tInfo.join(" | "), 20, 57);

        let y = 70; let col = 0;
        panels.forEach((p, i) => {
            const key = isEnt ? `img-${i}-ent` : `img-${i}-dev`;
            if(data[key]) {
                if(y > 240) { doc.addPage(); y = 20; }
                const x = col === 0 ? 20 : 110;
                doc.setFontSize(7); doc.text(p.toUpperCase(), x, y);
                doc.addImage(data[key], 'JPEG', x, y + 2, 80, 50);
                if(col === 1) { y += 60; col = 0; } else { col = 1; }
            }
        });

        if(data.extras.length > 0) {
            doc.addPage(); doc.setFontSize(14); doc.text("DAÑOS EXTRAS", 20, 20);
            let ey = 30;
            data.extras.forEach(ex => {
                if(ey > 240) { doc.addPage(); ey = 20; }
                doc.addImage(ex.src, 'JPEG', 20, ey, 80, 50);
                doc.setFontSize(9); doc.text(ex.note || "Sin nota", 110, ey + 25);
                ey += 55;
            });
        }

        if(!signaturePad.isEmpty()) {
            doc.addPage(); doc.text("FIRMA DEL CLIENTE", 20, 20);
            doc.addImage(signaturePad.toDataURL(), 'PNG', 20, 30, 80, 40);
        }

        doc.save(`Auditoria_${pat}_${mode}.pdf`);
    }

    function syncData() {
        const pat = document.getElementById('patente').value;
        const saved = localStorage.getItem('maximo_' + pat);
        if(saved) {
            data = JSON.parse(saved);
            panels.forEach((_, i) => {
                if(data[`img-${i}-ent`]) {
                    const img = document.getElementById(`prev-${i}-ent`);
                    img.src = data[`img-${i}-ent`]; img.style.display = 'block';
                    document.getElementById(`item-${i}`).classList.add('done');
                }
            });
            setOpMode('devolucion');
        }
    }
</script>
</body>
</html>
