<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Rent A Car v3</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --main: #1a1a1a; --blue: #0056b3; --orange: #e67e22; --gray: #f4f7f6; --success: #27ae60; }
        body { font-family: -apple-system, sans-serif; background: #d1d8e0; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        header { background: var(--main); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--blue); }
        .logo-img { max-width: 100px; height: auto; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
        
        .tabs { display: flex; background: #eee; padding: 5px; gap: 2px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; font-weight: bold; cursor: pointer; background: none; transition: 0.3s; font-size: 11px; border-radius: 8px; text-transform: uppercase; }
        .tab-btn.active { background: white; color: var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .content { padding: 20px; display: none; }
        .content.active { display: block !important; }

        .section-title { background: #f8f9fa; color: var(--blue); padding: 8px; font-weight: bold; border-left: 4px solid var(--blue); margin: 20px 0 10px; font-size: 12px; text-transform: uppercase; }
        
        label { display: block; margin: 15px 0 5px; font-weight: 700; font-size: 14px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        
        /* MÓDULO COMPARATIVO */
        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .panel-card { border: 1px solid #ddd; padding: 10px; border-radius: 12px; text-align: center; background: #fafafa; }
        .panel-label { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; }
        .thumb-container { display: flex; gap: 5px; margin-top: 5px; }
        .thumb { width: 100%; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #ccc; display: none; }
        
        .sig-container { border: 2px dashed #ccc; background: #fafafa; border-radius: 15px; margin-top: 10px; height: 150px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 15px; color: white; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-blue { background: var(--blue); }
        .btn-orange { background: var(--orange); }
        .btn-save { background: var(--success); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Maximo Rent A Car" class="logo-img">
        <h2 style="margin:0; letter-spacing: 1px; font-size: 16px;">MAXIMO <span style="color:var(--blue)">RENT A CAR</span></h2>
    </header>

    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="switchTab('mecanica')">Inspección</button>
        <button id="t3" class="tab-btn" onclick="switchTab('entrega')">Entrega/Devolución</button>
        <button id="t2" class="tab-btn" onclick="switchTab('danos')">Diferencias</button>
    </div>

    <div id="entrega" class="content">
        <div class="section-title">Registro de Unidad</div>
        <label>Patente Vehículo</label>
        <input type="text" id="pat_comp" placeholder="ABC-123" oninput="loadHistory()">
        
        <label>Nombre del Empleado</label>
        <input type="text" id="emp_comp" placeholder="Operador de turno">

        <div id="status-msg" style="font-size: 12px; color: var(--blue); margin-top: 10px; font-weight: bold;"></div>

        <div class="section-title">Registro de Paneles</div>
        <div class="panel-grid">
            <div class="panel-card">
                <span class="panel-label">FRONTAL</span>
                <input type="file" accept="image/*" capture="camera" onchange="processPanel(this, 'front')">
                <div class="thumb-container">
                    <img id="prev_front_old" class="thumb" title="Entrega">
                    <img id="prev_front_new" class="thumb" title="Devolución">
                </div>
            </div>
            <div class="panel-card">
                <span class="panel-label">TRASERO</span>
                <input type="file" accept="image/*" capture="camera" onchange="processPanel(this, 'back')">
                <div class="thumb-container">
                    <img id="prev_back_old" class="thumb">
                    <img id="prev_back_new" class="thumb">
                </div>
            </div>
            <div class="panel-card">
                <span class="panel-label">LAT. IZQUIERDO</span>
                <input type="file" accept="image/*" capture="camera" onchange="processPanel(this, 'left')">
                <div class="thumb-container">
                    <img id="prev_left_old" class="thumb">
                    <img id="prev_left_new" class="thumb">
                </div>
            </div>
            <div class="panel-card">
                <span class="panel-label">LAT. DERECHO</span>
                <input type="file" accept="image/*" capture="camera" onchange="processPanel(this, 'right')">
                <div class="thumb-container">
                    <img id="prev_right_old" class="thumb">
                    <img id="prev_right_new" class="thumb">
                </div>
            </div>
        </div>

        <div class="section-title">Firma del Cliente</div>
        <div class="sig-container"><canvas id="sig-cliente"></canvas></div>
        <button onclick="clearSig()" style="width:100%; margin-top:5px; font-size:10px; padding:5px;">LIMPIAR FIRMA</button>

        <button class="btn-main btn-save" onclick="saveToLocal()">GUARDAR EN MEMORIA (SALIDA)</button>
        <button class="btn-main btn-blue" onclick="genPDFComp()">DESCARGAR REPORTE COMPARATIVO</button>
    </div>

    <div id="mecanica" class="content active">
        <p style="text-align:center; color:#888; font-size:12px;">Complete los datos en la pestaña Entrega para habilitar comparación.</p>
    </div>

    <div id="danos" class="content">
        <p style="text-align:center; color:#888; font-size:12px;">Use esta pestaña solo para fotos de daños específicos adicionales.</p>
    </div>
</div>

<script>
    let sigCliente;
    let localData = {};

    window.onload = () => {
        const canvas = document.getElementById('sig-cliente');
        sigCliente = new SignaturePad(canvas);
        resizeCanvas(canvas);
    };

    function resizeCanvas(canvas) {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function switchTab(tab) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        if(tab === 'mecanica') document.getElementById('t1').classList.add('active');
        if(tab === 'danos') document.getElementById('t2').classList.add('active');
        if(tab === 'entrega') document.getElementById('t3').classList.add('active');
    }

    // LÓGICA DE COMPARACIÓN Y MEMORIA
    function processPanel(input, side) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const isNew = document.getElementById(`prev_${side}_old`).style.display === 'block';
            const targetId = isNew ? `prev_${side}_new` : `prev_${side}_old`;
            const img = document.getElementById(targetId);
            img.src = e.target.result;
            img.style.display = 'block';
            localData[targetId] = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function loadHistory() {
        const pat = document.getElementById('pat_comp').value.toUpperCase();
        const msg = document.getElementById('status-msg');
        const saved = localStorage.getItem('maximo_' + pat);
        
        // Limpiar miniaturas actuales
        document.querySelectorAll('.thumb').forEach(img => { img.src = ''; img.style.display = 'none'; });

        if (saved) {
            const data = JSON.parse(saved);
            msg.innerText = "✓ SE ENCONTRÓ REGISTRO DE ENTREGA";
            ['front', 'back', 'left', 'right'].forEach(side => {
                if(data[`prev_${side}_old`]) {
                    const img = document.getElementById(`prev_${side}_old`);
                    img.src = data[`prev_${side}_old`];
                    img.style.display = 'block';
                }
            });
        } else {
            msg.innerText = "REGISTRO NUEVO (SALIDA)";
        }
    }

    function saveToLocal() {
        const pat = document.getElementById('pat_comp').value.toUpperCase();
        if(!pat) return alert("Ingrese patente");
        localStorage.setItem('maximo_' + pat, JSON.stringify(localData));
        alert("Datos de ENTREGA guardados en el dispositivo.");
    }

    function clearSig() { sigCliente.clear(); }

    function genPDFComp() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pat = document.getElementById('pat_comp').value.toUpperCase() || "S-D";

        // ENCABEZADO PRO
        doc.setFillColor(26, 26, 26); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("MAXIMO RENT A CAR", 20, 20);
        doc.setFontSize(10); doc.text("INFORME COMPARATIVO DE ESTADO", 20, 30);
        
        doc.setTextColor(0);
        doc.text(`Patente: ${pat}`, 20, 50);
        doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 150, 50);

        let y = 65;
        ['front', 'back', 'left', 'right'].forEach((side, i) => {
            const oldImg = document.getElementById(`prev_${side}_old`);
            const newImg = document.getElementById(`prev_${side}_new`);
            
            if(oldImg.src || newImg.src) {
                doc.setFontSize(9); doc.text(`PANEL: ${side.toUpperCase()}`, 20, y);
                if(oldImg.src.startsWith('data')) doc.addImage(oldImg.src, 'JPEG', 20, y+5, 80, 50);
                if(newImg.src.startsWith('data')) doc.addImage(newImg.src, 'JPEG', 110, y+5, 80, 50);
                doc.setFontSize(7); doc.text("ENTREGA", 20, y+58); doc.text("DEVOLUCIÓN", 110, y+58);
                y += 70;
                if(y > 240) { doc.addPage(); y = 20; }
            }
        });

        if(!sigCliente.isEmpty()) {
            doc.text("FIRMA DE CONFORMIDAD DEL CLIENTE:", 20, y+10);
            doc.addImage(sigCliente.toDataURL(), 'PNG', 20, y+15, 60, 25);
        }

        doc.save(`Estado_${pat}.pdf`);
    }
</script>
</body>
</html>
