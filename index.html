<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Rent A Car - Sistema de Auditoría</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --main: #1a1a1a; --blue: #0056b3; --orange: #e67e22; --success: #27ae60; --gray: #f4f7f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #d1d8e0; margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        header { background: var(--main); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--blue); }
        .logo-img { max-width: 90px; height: auto; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
        
        .tabs { display: flex; background: #eee; padding: 5px; gap: 2px; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; font-weight: bold; cursor: pointer; background: none; font-size: 10px; border-radius: 8px; text-transform: uppercase; color: #666; }
        .tab-btn.active { background: white; color: var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .content { padding: 20px; display: none; }
        .content.active { display: block !important; }

        .section-title { background: #f8f9fa; color: var(--blue); padding: 8px; font-weight: bold; border-left: 4px solid var(--blue); margin: 20px 0 10px; font-size: 12px; text-transform: uppercase; }
        
        label { display: block; margin: 15px 0 5px; font-weight: 700; font-size: 14px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        
        .mode-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; border: 2px solid var(--blue); border-radius: 12px; background: white; color: var(--blue); font-weight: bold; cursor: pointer; font-size: 11px; }
        .mode-btn.active { background: var(--blue); color: white; }

        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .panel-card { border: 1px solid #ddd; padding: 10px; border-radius: 12px; text-align: center; background: #fafafa; }
        .panel-label { font-size: 9px; font-weight: bold; margin-bottom: 5px; display: block; height: 20px; color: #333; }
        
        .thumb { width: 100%; height: 65px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; display: none; margin-top: 5px; }
        
        .sig-container { border: 2px dashed #ccc; background: #fafafa; border-radius: 15px; margin-top: 10px; height: 160px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 14px; color: white; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-blue { background: var(--blue); }
        .btn-success { background: var(--success); }
        .btn-orange { background: var(--orange); }

        #rafaga-status { padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Maximo Rent A Car" class="logo-img">
        <h2 style="margin:0; font-size: 16px; letter-spacing: 1px;">MAXIMO <span style="color:var(--blue)">RENT A CAR</span></h2>
    </header>

    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="switchTab('entrega')">Auditoría</button>
        <button id="t2" class="tab-btn" onclick="switchTab('mecanica')">Técnica</button>
        <button id="t3" class="tab-btn" onclick="switchTab('danos')">Daños Extra</button>
    </div>

    <div id="entrega" class="content active">
        <div class="section-title">Vehículo</div>
        <input type="text" id="pat_comp" placeholder="PATENTE (EJ: ABC-123)" oninput="this.value = this.value.toUpperCase(); loadHistory();">
        
        <div class="mode-selector">
            <button id="mode-ent" class="mode-btn active" onclick="setMode('entrega')">MODO ENTREGA</button>
            <button id="mode-dev" class="mode-btn" onclick="setMode('devolucion')">MODO DEVOLUCIÓN</button>
        </div>

        <div id="rafaga-status"></div>
        <button class="btn-main btn-orange" onclick="iniciarRafaga()">📷 INICIAR RÁFAGA (24 FOTOS)</button>

        <div class="section-title">Fotos por Panel</div>
        <div class="panel-grid" id="grid-paneles"></div>

        <div class="section-title">Firma Cliente</div>
        <div class="sig-container"><canvas id="sig-cliente"></canvas></div>
        <button onclick="sigCliente.clear()" style="width:100%; margin-top:5px; font-size:10px; border:none; background:none; text-decoration:underline; color:#666;">BORRAR FIRMA</button>

        <button class="btn-main btn-success" onclick="saveToLocal()">GUARDAR EN DISPOSITIVO</button>
        <button class="btn-main btn-blue" onclick="genPDF()">GENERAR PDF ACTUAL</button>
    </div>

    <div id="mecanica" class="content">
        <div class="section-title">Estado Mecánico</div>
        <label>Kilometraje (KM)</label>
        <input type="number" id="tec_km" placeholder="000000">
        <label>Observaciones de Motor / Luces</label>
        <textarea id="tec_obs" rows="5" placeholder="Escriba detalles aquí..."></textarea>
    </div>

    <div id="danos" class="content">
        <div class="section-title">Fotos de Daños Específicos</div>
        <div id="extra-container"></div>
        <button class="btn-main btn-orange" onclick="document.getElementById('add-ex').click()">+ AGREGAR OTRO DAÑO</button>
        <input type="file" id="add-ex" style="display:none" accept="image/*" capture="camera" onchange="addExtra(this)">
    </div>
</div>

<script>
    let sigCliente;
    let localData = {};
    let currentMode = 'entrega';
    let indiceRafaga = -1;

    const listaPaneles = [
        "Capot", "Parrilla", "Guardabarro Delantero L/C", "Guardabarro Delantero Izquierdo",
        "Puerta Conductor", "Puerta Trasera L/C", "Guardabarro Trasero L/C", "Baul",
        "Paragolpe Trasero", "Guardabarro Trasero L/A", "Puerta Trasera L/A", "Puerta Acompañante",
        "Guardabarro Delantero L/A", "Rueda C/D", "Rueda C/T", "Rueda A/D", "Rueda A/T",
        "Techo", "Parabrisas", "Motor", "Interior", "Asientos Delanteros", "Asientos Traseros", "Rueda Auxilio"
    ];

    window.onload = () => {
        const canvas = document.querySelector('canvas');
        sigCliente = new SignaturePad(canvas);
        renderPaneles();
        window.addEventListener('resize', () => resizeCanvas(canvas));
        resizeCanvas(canvas);
    };

    function resizeCanvas(canvas) {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function switchTab(tab) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        const btnId = tab === 'entrega' ? 't1' : tab === 'mecanica' ? 't2' : 't3';
        document.getElementById(btnId).classList.add('active');
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-ent').classList.toggle('active', mode === 'entrega');
        document.getElementById('mode-dev').classList.toggle('active', mode === 'devolucion');
    }

    function renderPaneles() {
        const grid = document.getElementById('grid-paneles');
        listaPaneles.forEach((nombre, index) => {
            const id = `p${index}`;
            const div = document.createElement('div');
            div.className = 'panel-card';
            div.innerHTML = `
                <span class="panel-label">${nombre.toUpperCase()}</span>
                <input type="file" id="input_${id}" accept="image/*" capture="camera" onchange="process(this, '${id}')" style="font-size:10px; width:100%">
                <img id="img_${id}_old" class="thumb" title="Entrega">
                <img id="img_${id}_new" class="thumb" title="Devolución">
            `;
            grid.appendChild(div);
        });
    }

    function iniciarRafaga() {
        indiceRafaga = 0;
        dispararSiguiente();
    }

    function dispararSiguiente() {
        const status = document.getElementById('rafaga-status');
        if (indiceRafaga < listaPaneles.length) {
            status.style.display = 'block';
            status.style.background = '#e67e22';
            status.style.color = 'white';
            status.innerHTML = `SIGUIENTE: ${listaPaneles[indiceRafaga].toUpperCase()}`;
            
            setTimeout(() => {
                document.getElementById(`input_p${indiceRafaga}`).click();
            }, 1000);
        } else {
            status.style.background = '#27ae60';
            status.innerHTML = "✓ RÁFAGA COMPLETADA";
            indiceRafaga = -1;
        }
    }

    function process(input, id) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const target = currentMode === 'devolucion' ? `img_${id}_new` : `img_${id}_old`;
            const img = document.getElementById(target);
            img.src = e.target.result;
            img.style.display = 'block';
            localData[target] = e.target.result;

            if (indiceRafaga !== -1) {
                indiceRafaga++;
                dispararSiguiente();
            }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function loadHistory() {
        const pat = document.getElementById('pat_comp').value;
        const saved = localStorage.getItem('maximo_' + pat);
        document.querySelectorAll('.thumb').forEach(i => { i.src = ''; i.style.display = 'none'; });
        if (saved) {
            localData = JSON.parse(saved);
            listaPaneles.forEach((_, i) => {
                const old = localData[`img_p${i}_old`];
                if(old) {
                    const img = document.getElementById(`img_p${i}_old`);
                    img.src = old; img.style.display = 'block';
                }
                const n = localData[`img_p${i}_new`];
                if(n) {
                    const img = document.getElementById(`img_p${i}_new`);
                    img.src = n; img.style.display = 'block';
                }
            });
            setMode('devolucion');
        } else { localData = {}; setMode('entrega'); }
    }

    function saveToLocal() {
        const pat = document.getElementById('pat_comp').value;
        if(!pat) return alert("Ingrese la patente");
        localStorage.setItem('maximo_' + pat, JSON.stringify(localData));
        alert("DATOS GUARDADOS. Ya puede descargar el PDF.");
    }

    function genPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pat = document.getElementById('pat_comp').value || "S-P";
        const esEntrega = currentMode === 'entrega';
        const titulo = esEntrega ? "REPORTE DE ENTREGA (SALIDA)" : "REPORTE DE DEVOLUCIÓN (ENTRADA)";

        doc.setFillColor(26, 26, 26); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(20); doc.text("MAXIMO RENT A CAR", 20, 25);
        doc.setFontSize(10); doc.text(titulo, 20, 32);
        
        doc.setTextColor(0); doc.text(`Vehículo: ${pat}`, 20, 50);
        doc.text(`Fecha: ${new Date().toLocaleString()}`, 130, 50);

        let y = 65;
        listaPaneles.forEach((nombre, i) => {
            const key = esEntrega ? `img_p${i}_old` : `img_p${i}_new`;
            const data = localData[key];
            if(data) {
                if(y > 240) { doc.addPage(); y = 20; }
                doc.setFontSize(8); doc.text(nombre.toUpperCase(), 20, y);
                doc.addImage(data, 'JPEG', 20, y+2, 75, 50);
                y += 58;
            }
        });

        if(!sigCliente.isEmpty()) {
            if(y > 230) doc.addPage();
            doc.text("FIRMA DEL CLIENTE:", 20, 260);
            doc.addImage(sigCliente.toDataURL(), 'PNG', 20, 265, 45, 15);
        }
        
        const nombreArchivo = esEntrega ? `Entrega_${pat}.pdf` : `Devolucion_${pat}.pdf`;
        doc.save(nombreArchivo);
    }

    function addExtra(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const div = document.createElement('div');
            div.style.border = "1px solid #ddd"; div.style.padding = "10px"; div.style.marginBottom = "10px";
            div.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px"><input type="text" placeholder="Describa el daño aquí" style="margin-top:5px">`;
            document.getElementById('extra-container').appendChild(div);
        };
        reader.readAsDataURL(input.files[0]);
    }
</script>
</body>
</html>
