<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Check Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #1a1a1a; --accent: #0056b3; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Pestañas */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #ddd; padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: none; color: #666; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 15px; padding-bottom: 10px; }
        .section { background: var(--primary); color: white; padding: 8px 12px; font-weight: bold; margin: 15px 0 10px; border-radius: 6px; font-size: 0.8em; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px; font-weight: 600; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* Estilo para fotos */
        .photo-card { border: 2px dashed #ccc; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; }
        
        .btn-pdf { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 1.1em; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">Maximo Rent A Car</h2>
        <small id="sub-title">CONTROL DE UNIDADES</small>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'mecanica')">Inspección</button>
        <button class="tab-btn" onclick="openTab(event, 'danos')">Fotos de Daños</button>
    </div>

    <div id="mecanica" class="tab-content active">
        <div class="section">Datos de la Unidad</div>
        <input type="text" id="auto_m" placeholder="Patente (Ej: AE123CC)">
        <input type="number" id="km_m" placeholder="KM actuales" style="margin-top:10px">

        <div class="section">Estado de Fluidos</div>
        <div class="grid">
            <select id="aceite"><option>Aceite: OK</option><option>Aceite: BAJO</option></select>
            <select id="agua"><option>Agua: OK</option><option>Agua: BAJO</option></select>
        </div>
        
        <div class="section">Seguridad</div>
        <div class="grid">
            <select id="luces"><option>Luces: OK</option><option>Luces: FALLA</option></select>
            <select id="ruedas"><option>Ruedas: OK</option><option>Ruedas: BAJA</option></select>
        </div>
        <textarea id="obs_m" rows="3" placeholder="Observaciones generales..." style="margin-top:10px"></textarea>
        <button class="btn-pdf" onclick="generarPDFMecanico()">GENERAR REPORTE MECÁNICO</button>
    </div>

    <div id="danos" class="tab-content">
        <div class="section">Datos del Vehículo</div>
        <input type="text" id="auto_d" placeholder="Patente del vehículo">
        
        <div class="section">Registro de Evidencia</div>
        
        <div class="photo-card">
            <label>Foto Daño #1</label>
            <input type="file" accept="image/*" capture="camera" onchange="previewFile(this, 'p1')">
            <img id="p1" class="preview-img">
            <textarea id="t1" placeholder="Descripción del daño 1..." style="margin-top:5px"></textarea>
        </div>

        <div class="photo-card">
            <label>Foto Daño #2</label>
            <input type="file" accept="image/*" capture="camera" onchange="previewFile(this, 'p2')">
            <img id="p2" class="preview-img">
            <textarea id="t2" placeholder="Descripción del daño 2..." style="margin-top:5px"></textarea>
        </div>

        <button class="btn-pdf" onclick="generarPDFDanos()" style="background: #e67e22;">GENERAR PDF DE DAÑOS</button>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function previewFile(input, imgId) {
        const preview = document.getElementById(imgId);
        const file = input.files[0];
        const reader = new FileReader();
        reader.onloadend = () => { preview.src = reader.result; preview.style.display = "block"; }
        if (file) reader.readAsDataURL(file);
    }

    function generarPDFMecanico() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(30, 30, 30); doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255); doc.setFontSize(18); doc.text("MAXIMO RENT A CAR - MECÁNICA", 20, 20);
        doc.setTextColor(0); doc.setFontSize(12);
        let y = 45;
        const line = (t, v) => { doc.text(`${t} ${v}`, 20, y); y += 10; };
        line("FECHA:", new Date().toLocaleDateString());
        line("PATENTE:", document.getElementById('auto_m').value);
        line("KM:", document.getElementById('km_m').value);
        line("-", document.getElementById('aceite').value);
        line("-", document.getElementById('agua').value);
        line("-", document.getElementById('luces').value);
        line("-", document.getElementById('ruedas').value);
        doc.text("OBSERVACIONES:", 20, y+5);
        doc.text(document.getElementById('obs_m').value, 20, y+15);
        doc.save("Inspeccion.pdf");
    }

    async function generarPDFDanos() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFillColor(230, 126, 34); doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255); doc.setFontSize(18); doc.text("REPORTE DE DAÑOS - MAXIMO", 20, 20);
        
        doc.setTextColor(0); doc.text(`Vehículo: ${document.getElementById('auto_d').value}`, 20, 40);
        doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 20, 48);

        const addPhoto = async (imgId, textId, yPos) => {
            const img = document.getElementById(imgId);
            if (img.src) {
                try {
                    doc.addImage(img.src, 'JPEG', 20, yPos, 80, 60);
                    doc.setFontSize(10);
                    doc.text("ACLARACIÓN:", 110, yPos + 5);
                    const desc = doc.splitTextToSize(document.getElementById(textId).value, 80);
                    doc.text(desc, 110, yPos + 12);
                    return yPos + 70;
                } catch (e) { return yPos; }
            }
            return yPos;
        };

        let currentY = 60;
        currentY = await addPhoto('p1', 't1', currentY);
        currentY = await addPhoto('p2', 't2', currentY);

        doc.save("Reporte_Danos.pdf");
    }
</script>
</body>
</html>
