<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maximo Rent A Car - Sistema Auditoría</title>
    
    <style>
        :root { --main: #1a1a1a; --blue: #0056b3; --orange: #e67e22; --success: #27ae60; }
        body { font-family: -apple-system, sans-serif; background: #d1d8e0; margin: 0; padding: 10px; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        header { background: var(--main); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--blue); }
        .logo-img { max-width: 90px; height: auto; display: block; margin: 0 auto 5px; }
        
        .tabs { display: flex; background: #eee; padding: 5px; gap: 2px; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; font-weight: bold; background: none; font-size: 10px; border-radius: 8px; text-transform: uppercase; color: #666; }
        .tab-btn.active { background: white; color: var(--blue); }

        .content { padding: 15px; display: none; }
        .content.active { display: block !important; }

        .section-title { background: #f8f9fa; color: var(--blue); padding: 8px; font-weight: bold; border-left: 4px solid var(--blue); margin: 15px 0 10px; font-size: 11px; text-transform: uppercase; }
        
        label { display: block; margin: 12px 0 5px; font-weight: 700; font-size: 13px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; border: 2px solid var(--blue); border-radius: 12px; background: white; color: var(--blue); font-weight: bold; font-size: 11px; }
        .mode-btn.active { background: var(--blue); color: white; }

        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .panel-card { border: 1px solid #ddd; padding: 8px; border-radius: 12px; text-align: center; background: #fafafa; position: relative; }
        .panel-card.filled { border-color: var(--success); background: #f0fff4; }
        .panel-label { font-size: 9px; font-weight: bold; display: block; height: 18px; }
        
        .thumb { width: 100%; height: 60px; object-fit: cover; border-radius: 6px; display: none; margin-top: 5px; }
        
        .sig-container { border: 2px dashed #ccc; background: #fafafa; border-radius: 15px; height: 160px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 14px; color: white; margin-top: 10px; text-transform: uppercase; }
        .btn-blue { background: var(--blue); }
        .btn-success { background: var(--success); }
        .btn-orange { background: var(--orange); }

        #btn-rafaga-cont { position: sticky; top: 10px; z-index: 100; background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 15px; border: 2px solid var(--orange); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Maximo Rent A Car" class="logo-img">
        <h2 style="margin:0; font-size: 16px;">MAXIMO <span style="color:var(--blue)">RENT A CAR</span></h2>
    </header>

    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="switchTab('entrega')">Fotos</button>
        <button id="t2" class="tab-btn" onclick="switchTab('mecanica')">Chequeo</button>
        <button id="t3" class="tab-btn" onclick="switchTab('danos')">Daños Extra</button>
    </div>

    <div id="entrega" class="content active">
        <input type="text" id="pat_comp" placeholder="PATENTE" oninput="this.value = this.value.toUpperCase(); loadHistory();">
        
        <div class="mode-selector">
            <button id="mode-ent" class="mode-btn active" onclick="setMode('entrega')">ENTREGA</button>
            <button id="mode-dev" class="mode-btn" onclick="setMode('devolucion')">DEVOLUCIÓN</button>
        </div>

        <div id="btn-rafaga-cont">
            <div id="txt-siguiente" style="font-size: 10px; font-weight: bold; text-align: center; color: var(--orange); margin-bottom: 5px;">PULSA PARA INICIAR SECUENCIA</div>
            <button class="btn-main btn-orange" id="main-cam-btn" onclick="triggerCam()" style="margin:0">📷 TOMAR FOTO: CAPOT</button>
        </div>

        <div class="panel-grid" id="grid-paneles"></div>

        <div class="section-title">Firma conforme</div>
        <div class="sig-container"><canvas id="sig-cliente"></canvas></div>
        <button onclick="sigCliente.clear()" style="width:100%; margin-top:5px; font-size:10px; border:none; background:none; text-decoration:underline;">BORRAR FIRMA</button>

        <button class="btn-main btn-success" onclick="saveToLocal()">GUARDAR ESTADO</button>
        <button class="btn-main btn-blue" onclick="genPDF()">DESCARGAR REPORTE</button>
    </div>

    <div id="mecanica" class="content">
        <div class="section-title">Niveles</div>
        <div class="grid-2">
            <div><label>Aceite</label><select id="tec_oil"><option>OK</option><option>BAJO</option><option>CAMBIO</option></select></div>
            <div><label>Agua</label><select id="tec_wat"><option>OK</option><option>BAJO</option></select></div>
        </div>
        <div class="section-title">Estado General</div>
        <div class="grid-2">
            <div><label>Frenos</label><select id="tec_brake"><option>OK</option><option>RUIDO</option></select></div>
            <div><label>Luces</label><select id="tec_lights"><option>TODAS OK</option><option>FALLA DEL.</option><option>FALLA TRAS.</option></select></div>
        </div>
        <div class="grid-2">
            <div><label>Neumáticos</label><select id="tec_tires"><option>BUENOS</option><option>GASTADOS</option></select></div>
            <div><label>Combustible</label><select id="tec_fuel"><option>FULL</option><option>3/4</option><option>1/2</option><option>1/4</option></select></div>
        </div>
        <label>KM Actual</label>
        <input type="number" id="tec_km" placeholder="000000">
        <label>Observaciones</label>
        <textarea id="tec_obs" rows="4"></textarea>
    </div>

    <div id="danos" class="content">
        <div id="extra-container"></div>
        <button class="btn-main btn-orange" onclick="document.getElementById('add-ex').click()">+ AGREGAR FOTO DAÑO DETALLADO</button>
        <input type="file" id="add-ex" style="display:none" accept="image/*" capture="camera" onchange="addExtra(this)">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<script>
    let sigCliente;
    let localData = { extras: [] };
    let currentMode = 'entrega';
    let indiceRafaga = 0;

    const listaPaneles = [
        "Capot", "Parrilla", "G-Barro Del. Izq", "G-Barro Del. Der",
        "Puerta Cond.", "Puerta Tras. Izq", "Puerta Acomp.", "Puerta Tras. Der",
        "G-Barro Tras. Izq", "G-Barro Tras. Der", "Baul", "Paragolpe Tras.",
        "Rueda Del. Izq", "Rueda Del. Der", "Rueda Tras. Izq", "Rueda Tras. Der",
        "Techo", "Parabrisas", "Motor", "Interior Del.", "Interior Tras.", "Asientos", "Auxilio", "Tablero"
    ];

    window.onload = () => {
        sigCliente = new SignaturePad(document.querySelector('canvas'));
        renderPaneles();
        resizeCanvas();
    };

    function resizeCanvas() {
        const canvas = document.querySelector('canvas');
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function switchTab(t) {
        document.querySelectorAll('.content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.getElementById(t === 'entrega' ? 't1' : t === 'mecanica' ? 't2' : 't3').classList.add('active');
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('mode-ent').classList.toggle('active', m === 'entrega');
        document.getElementById('mode-dev').classList.toggle('active', m === 'devolucion');
    }

    function renderPaneles() {
        const grid = document.getElementById('grid-paneles');
        listaPaneles.forEach((n, i) => {
            const div = document.createElement('div');
            div.className = 'panel-card';
            div.id = `card_p${i}`;
            div.innerHTML = `<span class="panel-label">${n.toUpperCase()}</span>
                             <input type="file" id="input_p${i}" accept="image/*" capture="camera" onchange="process(${i})" style="display:none">
                             <img id="img_p${i}_old" class="thumb"><img id="img_p${i}_new" class="thumb">`;
            grid.appendChild(div);
        });
    }

    function triggerCam() {
        if(indiceRafaga < listaPaneles.length) {
            document.getElementById(`input_p${indiceRafaga}`).click();
        } else {
            alert("Secuencia completa. Reiniciando...");
            indiceRafaga = 0;
            updateRafagaUI();
        }
    }

    function process(i) {
        const file = document.getElementById(`input_p${i}`).files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const key = currentMode === 'devolucion' ? `img_p${i}_new` : `img_p${i}_old`;
            localData[key] = e.target.result;
            const img = document.getElementById(key);
            img.src = e.target.result;
            img.style.display = 'block';
            document.getElementById(`card_p${i}`).classList.add('filled');
            
            if(i === indiceRafaga) {
                indiceRafaga++;
                updateRafagaUI();
            }
        };
        reader.readAsDataURL(file);
    }

    function updateRafagaUI() {
        const btn = document.getElementById('main-cam-btn');
        const txt = document.getElementById('txt-siguiente');
        if(indiceRafaga < listaPaneles.length) {
            btn.innerHTML = `📷 TOMAR FOTO: ${listaPaneles[indiceRafaga].toUpperCase()}`;
            txt.innerHTML = `PASO ${indiceRafaga + 1} DE 24`;
        } else {
            btn.innerHTML = `✓ SECUENCIA FINALIZADA`;
            btn.classList.replace('btn-orange', 'btn-success');
        }
    }

    function addExtra(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const id = Date.now();
            localData.extras.push({ id, src: e.target.result, note: "" });
            const div = document.createElement('div');
            div.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-top:10px;">
                             <input type="text" placeholder="Nota del daño..." onchange="updateExtraNote(${id}, this.value)">`;
            document.getElementById('extra-container').appendChild(div);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function updateExtraNote(id, val) {
        const item = localData.extras.find(x => x.id === id);
        if(item) item.note = val;
    }

    function saveToLocal() {
        const pat = document.getElementById('pat_comp').value;
        if(!pat) return alert("Ingrese Patente");
        localStorage.setItem('maximo_' + pat, JSON.stringify(localData));
        alert("DATOS GUARDADOS CORRECTAMENTE");
    }

    function genPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pat = document.getElementById('pat_comp').value || "S-P";
        
        doc.setFillColor(30); doc.rect(0, 0, 210, 35, 'F');
        doc.setTextColor(255); doc.text("MAXIMO RENT A CAR - REPORTE", 20, 22);
        doc.setTextColor(0); doc.setFontSize(10);
        doc.text(`Patente: ${pat} | Modo: ${currentMode.toUpperCase()}`, 20, 45);

        let y = 55;
        // Paneles
        listaPaneles.forEach((n, i) => {
            const key = currentMode === 'devolucion' ? `img_p${i}_new` : `img_p${i}_old`;
            if(localData[key]) {
                if(y > 240) { doc.addPage(); y = 20; }
                doc.text(n.toUpperCase(), 20, y);
                doc.addImage(localData[key], 'JPEG', 20, y+2, 80, 50);
                y += 58;
            }
        });

        // Extras
        if(localData.extras.length > 0) {
            doc.addPage(); doc.text("DAÑOS EXTRAS DETALLADOS", 20, 20);
            y = 30;
            localData.extras.forEach(ex => {
                if(y > 240) { doc.addPage(); y = 20; }
                doc.addImage(ex.src, 'JPEG', 20, y, 80, 50);
                doc.text(ex.note || "Sin nota", 110, y + 25);
                y += 55;
            });
        }
        doc.save(`${currentMode}_${pat}.pdf`);
    }

    function loadHistory() {
        const pat = document.getElementById('pat_comp').value;
        const saved = localStorage.getItem('maximo_' + pat);
        if(saved) {
            localData = JSON.parse(saved);
            listaPaneles.forEach((_, i) => {
                const old = localData[`img_p${i}_old`];
                if(old) {
                    const img = document.getElementById(`img_p${i}_old`);
                    img.src = old; img.style.display = 'block';
                    document.getElementById(`card_p${i}`).classList.add('filled');
                }
            });
            setMode('devolucion');
            updateRafagaUI();
        }
    }
</script>
</body>
</html>
