<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximo Rent A Car - Gestión Profesional</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root {
  --primary: #7c3aed;        /* morado vivo */
  --primary-light: #c4b5fd;  /* morado pastel */
  --primary-soft: #ede9fe;   /* fondo muy suave */
  --text-dark: #1e293b;
  --text-light: #64748b;
  --bg: #f9fafb;
  --border: #e0e7ff;
  --shadow-card: rgba(124, 58, 237, 0.12);
  --shadow-button: rgba(124, 58, 237, 0.3);
}

* {
  box-sizing: border-box;
  font-synthesis: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
    Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 20px;
  color: var(--text-dark);
  -webkit-tap-highlight-color: transparent;
}

.container {
  max-width: 680px;
  margin: auto;
  background: white;
  border-radius: 24px;
  padding: 32px 40px;
  box-shadow: 0 20px 40px var(--shadow-card);
}

/* HEADER */

header {
  text-align: center;
  margin-bottom: 36px;
}

header h1 {
  font-weight: 800;
  font-size: 24px;
  letter-spacing: 0.15em;
}

header h1 span {
  color: var(--primary);
}

/* TABS */

.tabs {
  display: flex;
  justify-content: space-around;
  background: var(--primary-soft);
  border-radius: 40px;
  padding: 8px;
  margin-bottom: 36px;
  box-shadow: inset 0 2px 5px #ddd;
}

.tab-btn {
  flex: 1;
  background: transparent;
  border: none;
  font-weight: 600;
  font-size: 13px;
  padding: 10px 0;
  border-radius: 40px;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.3s ease;
  user-select: none;
}

.tab-btn.active {
  background: var(--primary);
  color: white;
  box-shadow:
    0 4px 12px var(--shadow-button);
}

/* CONTENT */

.content {
  display: none;
}

.content.active {
  display: block;
}

/* SECTIONS */

.section-title {
  font-weight: 600;
  font-size: 14px;
  margin: 32px 0 18px;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-left: 5px solid var(--primary);
  padding-left: 12px;
}

/* LABELS */

label {
  display: block;
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
  color: var(--text-dark);
}

/* GRID */

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px 24px;
}

/* INPUTS, SELECT, TEXTAREA */

input,
select,
textarea {
  width: 100%;
  padding: 14px 18px;
  font-size: 16px;
  font-weight: 400;
  color: var(--text-dark);
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  box-shadow:
    inset 0 1px 3px rgba(0, 0, 0, 0.06);
  transition:
    border-color 0.3s ease,
    box-shadow 0.3s ease;
  resize: vertical;
  outline-offset: 2px;
}

input::placeholder,
textarea::placeholder {
  color: var(--text-light);
  font-style: italic;
  font-weight: 400;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 12px var(--primary-soft);
  outline: none;
}

/* TEXTAREA */

textarea {
  min-height: 72px;
  line-height: 1.4;
}

/* SIG CONTAINER */

.sig-container {
  margin-top: 16px;
  border-radius: 16px;
  border: 2px dashed var(--primary-light);
  background: var(--primary-soft);
  height: 180px;
  overflow: hidden;
  position: relative;
}

canvas {
  width: 100%;
  height: 100%;
  touch-action: none;
  display: block;
}

/* BOTONES */

.btn-main {
  width: 100%;
  padding: 20px 0;
  font-weight: 700;
  font-size: 18px;
  border-radius: 32px;
  border: none;
  color: white;
  cursor: pointer;
  box-shadow: 0 8px 20px var(--shadow-button);
  transition: transform 0.15s ease, box-shadow 0.25s ease;
  margin-top: 30px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.btn-main:active {
  transform: scale(0.97);
  box-shadow: 0 4px 10px var(--shadow-button);
}

.btn-check {
  background: linear-gradient(135deg, #4f46e5, #8b5cf6);
}

.btn-danos {
  background: linear-gradient(135deg, #f97316, #fbbf24);
  color: #1f2937;
  box-shadow: 0 8px 18px rgba(251, 146, 60, 0.5);
}

.btn-entrega {
  background: linear-gradient(135deg, #22c55e, #16a34a);
}

/* BOTON TOMAR FOTO */

.btn-secuencial {
  background: var(--primary);
  color: white;
  border: none;
  padding: 22px 0;
  border-radius: 36px;
  font-weight: 700;
  font-size: 19px;
  letter-spacing: 0.05em;
  cursor: pointer;
  box-shadow: 0 6px 16px var(--shadow-button);
  transition: box-shadow 0.3s ease;
  user-select: none;
}

.btn-secuencial:hover {
  box-shadow: 0 10px 24px var(--shadow-button);
}

.btn-secuencial:active {
  transform: scale(0.97);
  box-shadow: 0 4px 10px var(--shadow-button);
}

/* GALERIA */

#galeria-entregas {
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
  gap: 12px;
}

/* TARJETAS DE FOTO DAÑOS */

.card-foto {
  background: white;
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.07);
  border-radius: 20px;
  padding: 18px 20px;
  margin-bottom: 26px;
  border: none;
  transition: box-shadow 0.3s ease;
}

.card-foto:hover {
  box-shadow: 0 12px 32px rgba(124, 58, 237, 0.15);
}

.card-foto label {
  color: var(--primary);
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 12px;
  display: block;
}

/* INDICADOR DE FOTO */

#foto-indicador {
  background: #fdf6fb;
  border: 1.5px solid #f5c6e8;
  padding: 18px;
  border-radius: 24px;
  margin-bottom: 18px;
  font-weight: 600;
  color: #9333ea;
  text-align: center;
  font-size: 15px;
}

/* RESPONSIVE */

@media (max-width: 480px) {
  .container {
    padding: 24px 28px;
    border-radius: 24px;
  }
  .grid {
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  input,
  select,
  textarea {
    font-size: 15px;
    padding: 14px 16px;
  }
  .btn-main {
    font-size: 17px;
    padding: 18px 0;
    border-radius: 28px;
  }
  .btn-secuencial {
    font-size: 18px;
    padding: 20px 0;
    border-radius: 32px;
  }
  header h1 {
    font-size: 22px;
  }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin:0; font-size: 20px; letter-spacing: 1px;">MAXIMO <span style="color:var(--blue)">RENT A CAR</span></h1>
    </header>

    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="switchTab('mecanica')">INSPECCIÓN</button>
        <button id="t2" class="tab-btn" onclick="switchTab('danos')">DAÑOS</button>
        <button id="t3" class="tab-btn" onclick="switchTab('entregas')">ENTREGAS</button>
    </div>

    <div id="mecanica" class="content active">
        <div class="grid">
            <div><label>Fecha del Informe</label><input type="date" id="fecha1"></div>
            <div><label>Patente Vehículo</label><input type="text" id="pat1" placeholder="ABC-123"></div>
        </div>
        <label>Nombre del Empleado</label><input type="text" id="emp" placeholder="Escriba su nombre">
        <label>Kilometraje Actual</label><input type="number" id="km1">
        
        <div class="section-title">Fluidos y Mecánica</div>
        <div class="grid">
            <div><label>Nivel de Aceite</label><select id="aceite"><option>OK (Nivel Normal)</option><option>BAJO</option><option>RECAMBIO</option></select></div>
            <div><label>Líquido Refrigerante</label><select id="agua"><option>OK (Nivel Normal)</option><option>BAJO</option></select></div>
        </div>
        <div class="grid">
            <div><label>Estado de Frenos</label><select id="frenos"><option>OK</option><option>REVISAR (Ruidos)</option></select></div>
            <div><label>Líquido Hidráulico</label><select id="hidra"><option>OK (Nivel Normal)</option><option>BAJO</option><option>N/A</option></select></div>
        </div>

        <div class="section-title">Seguridad y Accesorios</div>
        <div class="grid">
            <div><label>Sistema de Luces</label><select id="luces"><option>OK (Todas Funcionan)</option><option>FALLA (Lámpara Quemada)</option></select></div>
            <div><label>Neumáticos</label><select id="gomas"><option>OK</option><option>REVISAR</option></select></div>
        </div>
        <div class="grid">
            <div><label>Matafuego (Extintor)</label><select id="extintor"><option>OK (Vigente)</option><option>VENCIDO o FALTA</option></select></div>
            <div><label>Balizas</label><select id="balizas"><option>OK</option><option>FALTAN</option></select></div>
        </div>
        <label>Zorrinillo</label><select id="zorrillo"><option>OK (Funciona)</option><option>VACÍO)</option></select>

        <label>Observaciones Adicionales</label>
        <textarea id="obs" rows="2" placeholder="Ej: Rayón en puerta, ruidito..."></textarea>

        <div class="section-title">Firma del Empleado</div>
        <div class="sig-container"><canvas id="pad1"></canvas></div>
        <button onclick="p1.clear()" style="width:100%; margin-top:8px; border:none; background:none; color:#666; text-decoration:underline; font-size:12px; cursor:pointer;">Borrar Firma</button>
        
        <button id="btn1" class="btn-main btn-check">DESCARGAR INFORME TÉCNICO</button>
    </div>

    <div id="danos" class="content">
        <div class="grid">
            <div><label>Fecha</label><input type="date" id="fecha2"></div>
            <div><label>Patente Vehículo</label><input type="text" id="pat2" placeholder="ABC-123"></div>
        </div>
        <label>Número de Reserva</label><input type="text" id="res2" placeholder="Ej: 12345">
        
        <div id="contenedor-danos" style="margin-top:20px;"></div>
        <button onclick="addDano()" style="width:100%; padding:15px; border:2px solid var(--orange); border-radius:10px; background:none; color:var(--orange); font-weight:bold; cursor:pointer;">+ AGREGAR FOTO DE DAÑO</button>
        
        <button id="btn2" class="btn-main btn-danos">DESCARGAR REPORTE DE DAÑOS</button>
    </div>

    <div id="entregas" class="content">
        <div class="grid">
            <div><label>Fecha</label><input type="date" id="fecha3"></div>
            <div><label>Tipo de Movimiento</label><select id="tipo3"><option>ENTREGA</option><option>DEVOLUCION</option></select></div>
        </div>
        <div class="grid">
            <div><label>Patente Vehículo</label><input type="text" id="pat3" placeholder="ABC-123"></div>
            <div><label>Número de Reserva</label><input type="text" id="res3" placeholder="Ej: 12345"></div>
        </div>
        <div class="grid">
            <div><label>Kilometraje</label><input type="number" id="km3"></div>
            <div><label>Nivel Combustible</label>
                <select id="comb3">
                    <option value="1/8">1/8 (Reserva)</option><option value="2/8">2/8</option><option value="3/8">3/8</option><option value="4/8">4/8 (1/2)</option>
                    <option value="5/8">5/8</option><option value="6/8">6/8 (3/4)</option><option value="7/8">7/8</option><option value="8/8">8/8 (FULL)</option>
                </select>
            </div>
        </div>

        <div class="section-title">Secuencia Obligatoria de Fotos</div>
        <div id="foto-indicador">
            <span style="font-size:12px; color:#666;">TOMAR FOTO DE:</span><br>
            <strong id="nombre-parte" style="font-size:18px; color:var(--main);">CAPOT</strong>
        </div>
        <input type="file" id="cam-input" accept="image/*" capture="camera" style="display:none">
        <button id="btn-sec" class="btn-secuencial">📸 TOMAR FOTO</button>
        <div id="galeria-entregas"></div>

        <div class="section-title">Firma de Conformidad del Cliente</div>
        <div class="sig-container"><canvas id="pad3"></canvas></div>
        <button onclick="p3.clear()" style="width:100%; margin-top:8px; border:none; background:none; color:#666; text-decoration:underline; font-size:12px; cursor:pointer;">Borrar Firma</button>

        <button id="btn3" class="btn-main btn-entrega">DESCARGAR INFORME MOVIMIENTO</button>
    </div>
</div>

<script>
    // Variables Globales
    let p1, p3;
    let danoIdx = 0;
    const partes = ["CAPOT", "PARAGOLPE D", "GUARDABARRO C/D", "PUERTA C", "PUERTA C/T", "GUARDABARRO C/T", "BAÚL", "PARAGOLPE TRASERO", "GUARDABARRO A/T", "PUERTA A/T", "PUERTA A", "GUARDABARRO A/D", "TECHO", "PARABRISAS", "INTERIOR", "ASIENTOS", "MOTOR", "AUXILIO"];
    let parteIdx = 0;
    let fotosEntregas = [];

    // Inicialización al Cargar la Ventana
    window.onload = () => {
        const c1 = document.getElementById('pad1');
        const c3 = document.getElementById('pad3');
        p1 = new SignaturePad(c1);
        p3 = new SignaturePad(c3);
        
        const resizeCanvases = () => {
            [c1, c3].forEach(c => {
                const r = Math.max(window.devicePixelRatio || 1, 1);
                c.width = c.offsetWidth * r;
                c.height = c.offsetHeight * r;
                c.getContext("2d").scale(r, r);
            });
            p1.clear(); p3.clear(); // Limpia para evitar trazos fantasma al rotar
        };
        
        window.onresize = resizeCanvases;
        resizeCanvases();

        // Vinculación de Botones (Solución al fallo de Inspección)
        document.getElementById('btn1').onclick = genPDF1;
        document.getElementById('btn2').onclick = genPDF2;
        document.getElementById('btn3').onclick = genPDF3;
        document.getElementById('btn-sec').onclick = () => document.getElementById('cam-input').click();
        document.getElementById('cam-input').onchange = (e) => handleSec(e.target);
    };

    // Navegación de Pestañas
    function switchTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const btnId = id === 'mecanica' ? 't1' : id === 'danos' ? 't2' : 't3';
        document.getElementById(btnId).classList.add('active');
    }

    // Funciones Auxiliares para PDF Profesionales
    function drawHeader(doc, title, colorHex) {
        doc.setFillColor(colorHex);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.text("MAXIMO RENT A CAR", 20, 22);
        doc.setFontSize(11);
        doc.setFont("helvetica", "normal");
        doc.text(title, 20, 32);
    }

    // Estilo "Tabla Excel"
    function drawRow(doc, label, value, y) {
        doc.setDrawColor(230); // Gris muy claro
        doc.line(20, y+2, 190, y+2); // Línea horizontal
        doc.setTextColor(50);
        doc.setFontSize(10);
        doc.setFont("helvetica", "bold");
        doc.text(label + ":", 25, y);
        doc.setFont("helvetica", "normal");
        doc.text(String(value), 75, y);
        return y + 10;
    }

    // --- PDF PESTAÑA 1: INSPECCIÓN (Sin Imágenes) ---
    function genPDF1() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pat = (document.getElementById('pat1').value || "S/D").toUpperCase();
        
        drawHeader(doc, "INFORME DE INSPECCION TECNICA", "#0056b3");
        
        let y = 55;
        const campos = [
            ["FECHA DEL INFORME", document.getElementById('fecha1').value],
            ["NOMBRE EMPLEADO", document.getElementById('emp').value],
            ["PATENTE VEHÍCULO", pat],
            ["KILOMETRAJE ACTUAL", document.getElementById('km1').value],
            ["NIVEL DE ACEITE", document.getElementById('aceite').value],
            ["LÍQUIDO REFRIGERANTE", document.getElementById('agua').value],
            ["ESTADO DE FRENOS", document.getElementById('frenos').value],
            ["LÍQUIDO HIDRÁULICO", document.getElementById('hidra').value],
            ["SISTEMA DE LUCES", document.getElementById('luces').value],
            ["NEUMÁTICOS (GOMAS)", document.getElementById('gomas').value],
            ["MATA FUEGO (Extintor)", document.getElementById('extintor').value],
            ["JUEGO DE BALIZAS", document.getElementById('balizas').value],
            ["ZORRILLO (Limpiavidrios)", document.getElementById('zorrillo').value]
        ];
        
        campos.forEach(c => { y = drawRow(doc, c[0], c[1], y); });
        
        y += 5;
        doc.setFont("helvetica", "bold"); doc.text("OBSERVACIONES ADICIONALES:", 25, y);
        y += 7;
        doc.setFont("helvetica", "normal"); doc.setFontSize(9);
        doc.text(document.getElementById('obs').value || "Sin novedades.", 25, y, {maxWidth: 160});
        
        if(!p1.isEmpty()) {
            doc.setFontSize(11); doc.setFont("helvetica", "bold");
            doc.text("FIRMA DEL EMPLEADO RESPONSABLE:", 25, 250);
            doc.addImage(p1.toDataURL(), 'PNG', 25, 255, 50, 20);
        }
        
        doc.save(`Inspeccion_${pat}.pdf`);
    }

    // --- PDF PESTAÑA 2: DAÑOS (Imágenes Página Completa) ---
    function addDano() {
        danoIdx++;
        const div = document.createElement('div');
        div.className = 'card-foto';
        div.innerHTML = `<label style="color:var(--orange)">FOTO DAÑO #${danoIdx}</label><input type="file" accept="image/*" capture="camera" onchange="readImgDano(this, 'txt${danoIdx}')"><textarea id="txt${danoIdx}" placeholder="Describa el daño aquí (ej: Rayón profundo 5cm)..." rows="2" style="margin-top:10px"></textarea>`;
        document.getElementById('contenedor-danos').appendChild(div);
    }

    // Guardamos las imágenes de daños en un array
    let imagenesDanosBase64 = [];
    function readImgDano(input, txtId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                // Guardamos el objeto con la imagen y el ID del texto correspondiente
                imagenesDanosBase64.push({src: e.target.result, txtId: txtId});
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function genPDF2() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pat = (document.getElementById('pat2').value || "S/D").toUpperCase();
        const res = document.getElementById('res2').value || "S/D";
        
        // --- PÁGINA 1: DATOS (Sin Firma) ---
        drawHeader(doc, "REPORTE DETALLADO DE DAÑOS", "#e67e22");
        let y = 55;
        y = drawRow(doc, "FECHA DEL REPORTE", document.getElementById('fecha2').value, y);
        y = drawRow(doc, "PATENTE VEHÍCULO", pat, y);
        y = drawRow(doc, "NÚMERO DE RESERVA", res, y);
        
        y += 20;
        doc.setFont("helvetica", "bold"); doc.setFontSize(12);
        doc.text(`SE ADJUNTAN ${imagenesDanosBase64.length} FOTOS DE DAÑOS EN LAS SIGUIENTES PÁGINAS.`, 20, y);

        // --- PÁGINAS SIGUIENTES: UNA FOTO A4 POR PÁGINA ---
        for (let i = 0; i < imagenesDanosBase64.length; i++) {
            const foto = imagenesDanosBase64[i];
            const desc = document.getElementById(foto.txtId).value || "Sin descripción.";
            
            doc.addPage();
            
            // Encabezado pequeño en cada hoja
            doc.setFillColor("#e67e22"); doc.rect(0, 0, 210, 20, 'F');
            doc.setTextColor(255); doc.setFontSize(14); doc.setFont("helvetica", "bold");
            doc.text(`DAÑO #${i+1} - Patente: ${pat}`, 20, 13);

            // Imagen ocupando casi toda la A4 (centrada)
            // Calculamos proporciones para no deformar (asumimos JPEG estándar)
            doc.addImage(foto.src, 'JPEG', 10, 25, 190, 140); // 190x140mm es un buen tamaño centrado

            // Descripción subenmarcada abajo
            doc.setFillColor(245); doc.rect(10, 170, 190, 30, 'F');
            doc.setTextColor(0); doc.setFontSize(11); doc.setFont("helvetica", "normal");
            doc.text("DESCRIPCIÓN:", 15, 178);
            doc.setFontSize(10);
            doc.text(desc, 15, 185, {maxWidth: 180});
        }
        
        doc.save(`Danos_${pat}_${res}.pdf`);
    }

    // --- PDF PESTAÑA 3: ENTREGAS (Imágenes Página Completa) ---
    function handleSec(input) {
        if (input.files && input.files[0] && parteIdx < partes.length) {
            const reader = new FileReader();
            reader.onload = (e) => {
                // Guardamos la imagen Base64 real
                fotosEntregas.push({ nombre: partes[parteIdx], src: e.target.result });
                
                // Miniatura en la web
                const div = document.createElement('div');
                div.style = "background:#eee; text-align:center; font-size:9px; padding:3px; border-radius:5px; border:1px solid #ddd;";
                div.innerHTML = `<img src="${e.target.result}" style="width:100%; height:50px; object-fit:cover; border-radius:3px;"><br><b>${partes[parteIdx]}</b>`;
                document.getElementById('galeria-entregas').appendChild(div);
                
                parteIdx++;
                if(parteIdx < partes.length) {
                    document.getElementById('nombre-parte').innerText = partes[parteIdx];
                } else {
                    document.getElementById('foto-indicador').innerHTML = "✅ FOTOS COMPLETAS";
                    document.getElementById('btn-sec').style.display = 'none';
                }
                document.getElementById('progreso-texto').innerText = `${parteIdx} de ${partes.length} fotos`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function genPDF3() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const tipo = document.getElementById('tipo3').value;
        const pat = (document.getElementById('pat3').value || "S/D").toUpperCase();
        const res = document.getElementById('res3').value || "S/D";
        
        // --- PÁGINA 1: DATOS + FIRMA CONFORMIDAD ---
        drawHeader(doc, `REPORTE DE ${tipo} DE UNIDAD`, "#27ae60");
        let y = 55;
        const campos = [
            ["FECHA MOVIMIENTO", document.getElementById('fecha3').value],
            ["TIPO DE MOVIMIENTO", tipo],
            ["PATENTE VEHÍCULO", pat],
            ["NÚMERO DE RESERVA", res],
            ["KILOMETRAJE", document.getElementById('km3').value],
            ["NIVEL COMBUSTIBLE", document.getElementById('comb3').value]
        ];
        campos.forEach(c => { y = drawRow(doc, c[0], c[1], y); });

        y += 15;
        doc.setFont("helvetica", "bold"); doc.setFontSize(11);
        doc.text(`SE ADJUNTAN ${fotosEntregas.length} FOTOS DEL ESTADO DE LA UNIDAD EN LAS SIGUIENTES PÁGINAS.`, 20, y);

        // Firma en la primer hoja
        if(!p3.isEmpty()) {
            doc.setFontSize(12); doc.setFont("helvetica", "bold");
            doc.text("FIRMA DE CONFORMIDAD DEL CLIENTE:", 25, 240);
            doc.addImage(p3.toDataURL(), 'PNG', 25, 245, 50, 25);
        }

        // --- PÁGINAS SIGUIENTES: UNA FOTO A4 POR PÁGINA ---
        fotosEntregas.forEach((foto, i) => {
            doc.addPage();
            
            // Encabezado verde en cada hoja
            doc.setFillColor("#27ae60"); doc.rect(0, 0, 210, 20, 'F');
            doc.setTextColor(255); doc.setFontSize(14); doc.setFont("helvetica", "bold");
            doc.text(`PANEL: ${foto.nombre} (${tipo}) - Patente: ${pat}`, 20, 13);

            // Imagen ocupando casi toda la A4 (JPEG para compresión)
            doc.addImage(foto.src, 'JPEG', 10, 25, 190, 250); // Ocupa casi todo el alto (250mm)
        });
        
        doc.save(`${tipo}_${pat}.pdf`);
    }
</script>
</body>
</html>
